                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">প্রয়োজনীয় রক্তের গ্রুপ</label>
                                    <div className="flex flex-wrap gap-2">
                                        {BLOOD_GROUPS.map(g => (
                                            <button key={g} onClick={()=>setBloodGroup(g)} className={`px-4 py-2 rounded-xl text-sm font-black transition ${bloodGroup===g?'bg-red-600 text-white shadow-lg scale-105':'bg-gray-100 text-gray-600'}`}>{g}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">হাসপাতালের নাম *</label>
                                    <input type="text" className="w-full p-3 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={hospital} onChange={e=>setHospital(e.target.value)} placeholder="যেমন: ঢাকা মেডিকেল কলেজ হাসপাতাল"/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">অবস্থান / ওয়ার্ড *</label>
                                    <input type="text" className="w-full p-3 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={location} onChange={e=>setLocation(e.target.value)} placeholder="যেমন: মিরপুর, ঢাকা — কেবিন নং ১০৫"/>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">অতিরিক্ত তথ্য</label>
                                    <textarea className="w-full p-3 border border-gray-200 rounded-xl text-sm outline-none resize-none focus:ring-2 focus:ring-red-200" rows="2" value={note} onChange={e=>setNote(e.target.value)} placeholder="রোগীর নাম, ব্যাগের সংখ্যা ইত্যাদি..."/>
                                </div>
                                <button onClick={sendRequest} disabled={sending} className="w-full py-3 bg-gradient-to-r from-red-700 to-red-500 text-white rounded-xl font-black text-sm shadow-lg hover:shadow-red-200 transition disabled:opacity-60">
                                    {sending ? '⏳ পাঠানো হচ্ছে...' : '🆘 ইমার্জেন্সি অনুরোধ পাঠান'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════
       LOCATION SEARCH
    ══════════════════════════════ */
    function LocationSearch({ donors, onOpenChat, onViewDonor, onClose }) {
        const [userLocation, setUserLocation] = useState(null);
        const [locating, setLocating] = useState(false);
        const [manualArea, setManualArea] = useState('');
        const [bloodGroup, setBloodGroupL] = useState('All');
        const [results, setResults] = useState([]);
        const [searched, setSearched] = useState(false);

        const getLocation = () => {
            setLocating(true);
            if (!navigator.geolocation) { alert('আপনার ব্রাউজার লোকেশন সাপোর্ট করে না'); setLocating(false); return; }
            navigator.geolocation.getCurrentPosition(
                pos => { setUserLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setLocating(false); },
                () => { alert('লোকেশন পাওয়া যায়নি। এলাকার নাম দিয়ে খুঁজুন।'); setLocating(false); }
            );
        };

        const search = () => {
            let filtered = donors.filter(d => getDonationStatus(d.lastDonationDate).canDonate);
            if (bloodGroup!=='All') filtered = filtered.filter(d=>d.bloodGroup===bloodGroup);
            if (manualArea.trim()) {
                const q = manualArea.trim().toLowerCase();
                filtered = filtered.filter(d => (d.address||'').toLowerCase().includes(q));
            }
            setResults(filtered);
            setSearched(true);
        };

        return (
            <div className="fixed inset-0 bg-black/60 z-[55] flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in">
                <div className="bg-white w-full sm:max-w-lg rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[92vh]">
                    <div className="bg-gradient-to-r from-blue-600 to-cyan-500 px-5 py-4 flex items-center justify-between text-white">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">📍</div>
                            <div><h2 className="font-black">লোকেশন-ভিত্তিক খোঁজ</h2><p className="text-[10px] text-white/60">কাছের প্রস্তুত ডোনার খুঁজুন</p></div>
                        </div>
                        <button onClick={onClose} className="bg-white/20 w-9 h-9 rounded-full flex items-center justify-center font-black text-xl">×</button>
                    </div>

                    <div className="p-4 space-y-3 border-b">
                        <div>
                            <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">এলাকার নাম লিখুন</label>
                            <input type="text" className="w-full p-3 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-200"
                                value={manualArea} onChange={e=>setManualArea(e.target.value)}
                                onKeyDown={e=>e.key==='Enter'&&search()}
                                placeholder="যেমন: মিরপুর, ঢাকা, চট্টগ্রাম..."/>
                        </div>
                        <div>
                            <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-2">রক্তের গ্রুপ ফিল্টার</label>
                            <div className="flex flex-wrap gap-1.5">
                                {['All',...BLOOD_GROUPS].map(g => (
                                    <button key={g} onClick={()=>setBloodGroupL(g)} className={`px-3 py-1.5 rounded-xl text-xs font-bold transition ${bloodGroup===g?'bg-blue-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>{g==='All'?'সব':g}</button>
                                ))}
                            </div>
                        </div>
                        <button onClick={search} className="w-full py-3 bg-gradient-to-r from-blue-600 to-cyan-500 text-white rounded-xl font-bold text-sm">🔍 খুঁজুন</button>
                    </div>

                    <div className="overflow-y-auto flex-1 p-4 space-y-2">
                        {!searched && (
                            <div className="text-center py-10 text-gray-300">
                                <p className="text-5xl mb-3">🗺️</p>
                                <p className="text-sm font-bold">এলাকার নাম দিয়ে কাছের ডোনার খুঁজুন</p>
                                <p className="text-xs mt-1">শুধুমাত্র প্রস্তুত ডোনার দেখাবে</p>
                            </div>
                        )}
                        {searched && results.length===0 && (
                            <div className="text-center py-10 text-gray-300">
                                <p className="text-5xl mb-3">😔</p>
                                <p className="text-sm font-bold">এই এলাকায় কোনো প্রস্তুত ডোনার নেই</p>
                            </div>
                        )}
                        {results.map(donor => (
                            <div key={donor.id} className="bg-green-50 border border-green-100 rounded-2xl p-3 flex items-center gap-3">
                                <div onClick={()=>{onViewDonor(donor);onClose();}} className="w-12 h-12 rounded-full overflow-hidden flex-shrink-0 border-2 border-green-400 cursor-pointer">
                                    {donor.image ? <img src={donor.image} className="w-full h-full object-cover"/> : <div className="w-full h-full bg-green-100 flex items-center justify-center text-green-700 font-black text-sm">{donor.bloodGroup}</div>}
                                </div>
                                <div className="flex-1 min-w-0" onClick={()=>{onViewDonor(donor);onClose();}} style={{cursor:'pointer'}}>
                                    <div className="flex items-center gap-2">
                                        <p className="font-bold text-sm truncate">{donor.name}</p>
                                        <span className="bg-red-100 text-red-700 text-[10px] font-black px-2 py-0.5 rounded-full flex-shrink-0">{donor.bloodGroup}</span>
                                    </div>
                                    <p className="text-xs text-gray-500 truncate">📍 {donor.address}</p>
                                    <p className="text-[10px] text-green-600 font-bold mt-0.5">✅ এখনই দিতে পারবেন</p>
                                </div>
                                <div className="flex flex-col gap-1 flex-shrink-0">
                                    <a href={`tel:${donor.phone}`} className="w-9 h-9 bg-green-100 hover:bg-green-200 rounded-full flex items-center justify-center text-base transition">📞</a>
                                    <button onClick={()=>{onOpenChat(donor);onClose();}} className="w-9 h-9 bg-indigo-50 hover:bg-indigo-100 rounded-full flex items-center justify-center text-base transition">💬</button>
                                </div>
                            </div>
                        ))}
                        {searched && results.length>0 && <p className="text-center text-xs text-gray-400 pt-2">{results.length} জন ডোনার পাওয়া গেছে</p>}
                    </div>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════
       DONATION HISTORY TRACKER
    ══════════════════════════════ */
    function DonationHistory({ currentUser, donorData, onClose, showToast }) {
        const [history, setHistory] = useState([]);
        const [loading, setLoading] = useState(true);
        const [addDate, setAddDate] = useState('');
        const [addNote, setAddNote] = useState('');
        const [adding, setAdding] = useState(false);
        const [showAdd, setShowAdd] = useState(false);

        useEffect(() => {
            const unsub = db.collection('donationHistory').where('donorId','==',currentUser.uid)
                .orderBy('donationDate','desc')
                .onSnapshot(snap => {
                    setHistory(snap.docs.map(d=>({id:d.id,...d.data()})));
                    setLoading(false);
                }, ()=>setLoading(false));
            return unsub;
        }, [currentUser.uid]);

        const addEntry = async () => {
            if (!addDate) return showToast('তারিখ দিন','error');
            setAdding(true);
            await db.collection('donationHistory').add({
                donorId: currentUser.uid,
                donorName: donorData?.name || '',
                bloodGroup: donorData?.bloodGroup || '',
                donationDate: addDate,
                note: addNote.trim(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            /* প্রোফাইলেও লাস্ট ডোনেশন আপডেট */
            if (history.length===0 || addDate > history[0]?.donationDate) {
                await db.collection('donors').doc(currentUser.uid).update({ lastDonationDate: addDate });
            }
            setAddDate(''); setAddNote(''); setShowAdd(false); setAdding(false);
            showToast('রক্তদানের তথ্য যোগ হয়েছে ✅','success');
        };

        const deleteEntry = async (id) => {
            if (!confirm('মুছে দিবেন?')) return;
            await db.collection('donationHistory').doc(id).delete();
            showToast('মুছে ফেলা হয়েছে','success');
        };

        const totalBags = history.length;
        const totalMl = totalBags * 450;

        return (
            <div className="fixed inset-0 bg-black/60 z-[55] flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in">
                <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[92vh]">
                    <div className="bg-gradient-to-r from-red-700 to-rose-500 px-5 py-4 flex items-center justify-between text-white">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">🩸</div>
                            <div><h2 className="font-black">রক্তদান ইতিহাস</h2><p className="text-[10px] text-white/60">{donorData?.name}</p></div>
                        </div>
                        <button onClick={onClose} className="bg-white/20 w-9 h-9 rounded-full flex items-center justify-center font-black text-xl">×</button>
                    </div>

                    {/* Stats */}
                    <div className="grid grid-cols-3 gap-3 p-4 bg-red-50">
                        <div className="bg-white rounded-2xl p-3 text-center shadow-sm">
                            <p className="text-2xl font-black text-red-600">{totalBags}</p>
                            <p className="text-[10px] text-gray-400 font-bold">মোট বার</p>
                        </div>
                        <div className="bg-white rounded-2xl p-3 text-center shadow-sm">
                            <p className="text-2xl font-black text-rose-600">{totalMl >= 1000 ? (totalMl/1000).toFixed(1)+'L' : totalMl+'ml'}</p>
                            <p className="text-[10px] text-gray-400 font-bold">মোট রক্ত</p>
                        </div>
                        <div className="bg-white rounded-2xl p-3 text-center shadow-sm">
                            <p className="text-2xl font-black text-pink-600">{totalBags * 3}</p>
                            <p className="text-[10px] text-gray-400 font-bold">জীবন বাঁচানো</p>
                        </div>
                    </div>

                    {/* Add button */}
                    <div className="px-4 pt-2 pb-1">
                        <button onClick={()=>setShowAdd(!showAdd)} className={`w-full py-2.5 rounded-xl text-sm font-bold transition ${showAdd?'bg-gray-100 text-gray-600':'bg-red-600 text-white hover:bg-red-700'}`}>
                            {showAdd ? '✕ বাতিল' : '➕ নতুন রক্তদান যোগ করুন'}
                        </button>
                    </div>

                    {showAdd && (
                        <div className="px-4 pb-3 space-y-2 bg-red-50 mx-4 rounded-2xl mb-2 p-4">
                            <div>
                                <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wide">রক্তদানের তারিখ</label>
                                <input type="date" className="w-full mt-1 p-2.5 border rounded-xl text-sm outline-none" value={addDate} onChange={e=>setAddDate(e.target.value)} max={new Date().toISOString().split('T')[0]}/>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wide">নোট (ঐচ্ছিক)</label>
                                <input type="text" className="w-full mt-1 p-2.5 border rounded-xl text-sm outline-none" value={addNote} onChange={e=>setAddNote(e.target.value)} placeholder="যেমন: ঢাকা মেডিকেল, রোগীর নাম..."/>
                            </div>
                            <button onClick={addEntry} className="w-full py-2.5 bg-red-600 text-white rounded-xl font-bold text-sm">{adding?'যোগ হচ্ছে...':'✔️ সেভ করুন'}</button>
                        </div>
                    )}

                    <div className="overflow-y-auto flex-1 px-4 pb-6 space-y-2 mt-2">
                        {loading && <div className="shimmer h-16 rounded-2xl"/>}
                        {!loading && history.length===0 && (
                            <div className="text-center py-12 text-gray-300">
                                <p className="text-5xl mb-3">🩸</p>
                                <p className="text-sm font-bold">এখনো কোনো রক্তদানের তথ্য নেই</p>
                                <p className="text-xs mt-1">আজকের রক্তদান যোগ করুন</p>
                            </div>
                        )}
                        {history.map((h,i) => (
                            <div key={h.id} className="flex items-center gap-3 bg-gray-50 rounded-2xl p-3 border hover:border-red-100 transition">
                                <div className="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center flex-shrink-0">
                                    <span className="text-red-600 font-black text-sm">#{history.length-i}</span>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="font-bold text-sm text-gray-800">{h.donationDate}</p>
                                    {h.note && <p className="text-xs text-gray-400 truncate">{h.note}</p>}
                                    <p className="text-[10px] text-green-600 font-bold mt-0.5">🩸 {donorData?.bloodGroup} · প্রায় ৪৫০ml</p>
                                </div>
                                <button onClick={()=>deleteEntry(h.id)} className="w-8 h-8 bg-red-50 hover:bg-red-100 rounded-full flex items-center justify-center text-sm transition flex-shrink-0">🗑️</button>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════
       NOTICE PANEL
    ══════════════════════════════ */
    function NoticePanel({ notices, isAdmin, onClose }) {
        const [title, setTitle] = useState(''); const [body, setBody] = useState(''); const [saving, setSaving] = useState(false);
        const [copiedId, setCopiedId] = useState(null);
        const handleAddNotice = async () => {
            if (!title.trim()||!body.trim()) return alert("শিরোনাম ও বিবরণ দিন");
            setSaving(true);
            try { 
                await db.collection('notices').add({ title:title.trim(), body:body.trim(), createdAt:firebase.firestore.FieldValue.serverTimestamp() });
                /* সব ইউজারের ইনবক্সে নোটিস পাঠাও */
                await broadcastToAllInbox(
                    'admin', 'notice',
                    '📢 ' + title.trim(),
                    body.trim(),
                    { fromName: 'রক্ত যোদ্ধা পরিবার', fromImage: '' }
                );
                showBrowserNotif(title.trim(), body.trim(), 'notice');
                setTitle(''); setBody(''); alert("নোটিস পাঠানো হয়েছে ✅"); }
            catch(e) { alert("ব্যর্থ: "+e.message); }
            setSaving(false);
        };
        const handleDeleteNotice = async (id) => {
            if (!confirm('নোটিসটি মুছে দিবেন?')) return;
            try { await db.collection('notices').doc(id).delete(); }
            catch(e) { alert("মুছতে পারা যায়নি: "+e.message); }
        };
        const copyNotice = (n, id) => {
            const txt = `${n.title}\n\n${n.body}`;
            const el = document.createElement('textarea'); el.value = txt; el.style.position='fixed'; el.style.opacity='0';
            document.body.appendChild(el); el.focus(); el.select();
            try { document.execCommand('copy'); } catch(e) {}
            document.body.removeChild(el);
            if (navigator.clipboard) navigator.clipboard.writeText(txt).catch(()=>{});
            setCopiedId(id); setTimeout(()=>setCopiedId(null), 2000);
        };
        return (
            <div className="fixed inset-0 bg-black/60 z-[55] flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in">
                <div className="bg-white w-full sm:max-w-lg rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">

                        <button onClick={onClose} className="font-black text-xl">×</button>

                    <div className="overflow-y-auto flex-1 p-5 space-y-4">

                            <div className="bg-orange-50 border border-orange-200 rounded-2xl p-4 space-y-3">
                                <input type="text" placeholder="নোটিসের শিরোনাম" className="w-full p-2 rounded-lg border text-sm" value={title} onChange={e=>setTitle(e.target.value)}/>
                                <textarea placeholder="বিস্তারিত..." className="w-full p-2 rounded-lg border text-sm" rows="2" value={body} onChange={e=>setBody(e.target.value)}/>
                                <button onClick={handleAddNotice} className="w-full bg-orange-500 text-white py-2 rounded-lg font-bold text-xs">{saving?"পাঠানো হচ্ছে...":"📢 নোটিস পাঠান"}</button>
                            </div>
                        )}
                        {notices.length===0 && <div className="text-center py-10 text-gray-300"><p className="text-5xl mb-3">📭</p><p className="text-sm font-bold">কোনো নোটিস নেই</p></div>}
                        {notices.map(n => (
                            <div key={n.id} className="border-b pb-3 last:border-0">
                                <div className="flex items-start justify-between gap-2">
                                    <div className="flex-1">
                                        <p className="font-bold text-gray-800 text-sm">{n.title}</p>
                                        <p className="text-xs text-gray-500 mt-1">{n.body}</p>
                                        {n.createdAt && <p className="text-[10px] text-gray-300 mt-1">{new Date(n.createdAt.toDate()).toLocaleDateString('bn-BD')}</p>}
                                    </div>
                                    <div className="flex flex-col gap-1 flex-shrink-0">
                                        <button onClick={()=>copyNotice(n, n.id)} className={`w-8 h-8 rounded-full flex items-center justify-center text-sm transition ${copiedId===n.id?'bg-green-100 text-green-600':'bg-blue-50 hover:bg-blue-100 text-blue-500'}`} title="কপি করুন">
                                            {copiedId===n.id?'✅':'📋'}
                                        </button>
                                        {isAdmin && (
                                            <button onClick={()=>handleDeleteNotice(n.id)} className="w-8 h-8 bg-red-50 hover:bg-red-100 text-red-500 rounded-full flex items-center justify-center text-sm transition" title="মুছুন">🗑️</button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );
    }

    function AdminBroadcast() {
        const [msg, setMsg] = useState(''); const [title, setTitle] = useState(''); const [sending, setSending] = useState(false); const [sent, setSent] = useState(false);
        const handleSend = async () => {
            if (!title.trim()||!msg.trim()) return alert("শিরোনাম ও বার্তা দিন");
            setSending(true);
            try { 
                await db.collection('notices').add({ title:title.trim(), body:msg.trim(), createdAt:firebase.firestore.FieldValue.serverTimestamp() });
                /* সব ইউজারের ইনবক্সে ব্রডকাস্ট পাঠাও */
                await broadcastToAllInbox(
                    'admin', 'notice',
                    '📢 ' + title.trim(),
                    msg.trim(),
                    { fromName: 'রক্ত যোদ্ধা পরিবার', fromImage: '' }
                );
                showBrowserNotif(title.trim(), msg.trim(), 'notice');
                setTitle(''); setMsg(''); setSent(true); setTimeout(()=>setSent(false),3000); }
            catch(e) { alert("ব্যর্থ: "+e.message); }
            setSending(false);
        };
        return (
            <div className="space-y-4">
                <div className="bg-gradient-to-br from-orange-50 to-amber-50 border border-orange-200 rounded-2xl p-4 space-y-3">
                    <h3 className="font-bold text-sm text-orange-700">📢 সকল ডোনারকে নোটিস পাঠান</h3>
                    <input type="text" placeholder="নোটিসের শিরোনাম" className="w-full p-3 border rounded-xl text-sm bg-white" value={title} onChange={e=>setTitle(e.target.value)}/>
                    <textarea placeholder="বিস্তারিত বার্তা..." className="w-full p-3 border rounded-xl text-sm bg-white resize-none" rows="4" value={msg} onChange={e=>setMsg(e.target.value)}/>
                    <button onClick={handleSend} className={`w-full py-3 rounded-xl font-bold text-sm transition ${sent?'bg-green-500 text-white':'bg-orange-500 hover:bg-orange-600 text-white'}`}>{sending?"পাঠানো হচ্ছে...":sent?"✅ পাঠানো হয়েছে!":"📢 নোটিস পাঠান"}</button>
                </div>
            </div>
        );
    }

                            <button onClick={()=>deleteReq(r.id, r.bloodGroup+' — '+r.hospital)} className="bg-red-100 text-red-600 px-3 py-2 rounded-xl text-xs font-bold">🗑️</button>

    function AdminFunds() {
        const [funds, setFunds] = useState([]);
        useEffect(() => {
            const unsub = db.collection('fundraising').orderBy('createdAt','desc')
                .onSnapshot(snap => setFunds(snap.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
            return unsub;
        }, []);

        const approve = async (f) => {
            if (!confirm(f.donorName + '-এর ৳' + f.amount + ' অনুদান অনুমোদন করবেন?')) return;
            await db.collection('fundraising').doc(f.id).update({ status:'approved' });
            await db.collection('donors').doc(f.donorUid).set({ isDonorMember: true }, { merge: true });
            /* ডোনারকে ইনবক্সে জানাও */
            try {
                await db.collection('userInbox').doc(f.donorUid).collection('notifications').add({
                    type: 'notice', fromName: 'রক্ত যোদ্ধা পরিবার', fromUid: 'admin', fromImage: '',
                    preview: '৳' + f.amount + ' অনুদান অনুমোদিত হয়েছে! আপনি Donor Member ব্যাজ পেয়েছেন 💚',
                    title: '✅ অনুদান অনুমোদিত', read: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) {}
            alert(f.donorName + '-এর অনুদান অনুমোদন হয়েছে ✅');
        };
        const reject = async (f) => {
            if (!confirm(f.donorName + '-এর অনুদান বাতিল করবেন?')) return;
            await db.collection('fundraising').doc(f.id).update({ status:'rejected' });

        const [authMode, setAuthMode] = useState('login');
        const [phoneNumber, setPhoneNumber] = useState('');
        const [loginName, setLoginName] = useState('');
        const [unreadNotices, setUnreadNotices] = useState(0);
        const [toast, setToast] = useState(null);
        const [fabOpen, setFabOpen] = useState(false);
        const [totalUnreadMessages, setTotalUnreadMessages] = useState(0);
        const fileInputRef = useRef(null);

        const [formData, setFormData] = useState({ name:'', bloodGroup:'A+', address:'', phone:'', lastDonationDate:new Date().toISOString().split('T')[0], image:'' });

        const showToast = useCallback((msg, type='success') => { setToast({ msg, type }); }, []);

        /* Inbox */
        const { inbox, unread: unreadInbox, markAllRead } = useInboxNotifications(user?.uid);

        useEffect(() => {
            const unsub = auth.onAuthStateChanged(async cu => {
                setUser(cu);
                if (cu) {
                    setIsAdmin(ADMIN_UIDS.includes(cu.uid));
                    const doc = await db.collection('donors').doc(cu.uid).get();
                    if (doc.exists) {
                        const d=doc.data();
                        setFormData(d);
                        setCurrentDonorData(d);
                        if (d.authMethod === 'google' && !d.profileComplete) {
                            setNeedsProfileSetup(true);
                        }
                        /* নোটিফিকেশন পারমিশন ও রিমাইন্ডার */
                        askNotifPermission().then(granted => {
                            if (granted) checkDonationReminder(d.lastDonationDate);
                        });
                    }
                }
            });
            return unsub;
        }, []);

        useEffect(() => {
            if (!user) return;
            const unsubDonors = db.collection('donors').onSnapshot(snap => setDonors(snap.docs.map(d=>({id:d.id,...d.data()}))));
            const unsubNotices = db.collection('notices').orderBy('createdAt','desc').onSnapshot(snap => { setNotices(snap.docs.map(d=>({id:d.id,...d.data()}))); setUnreadNotices(snap.docs.length); });
            /* মোট unread মেসেজ ট্র্যাক */
            const unsubChats = db.collection('chats')
                .where('participants','array-contains', user.uid)
                .onSnapshot(snap => {
                    let total = 0;
                    snap.docs.forEach(d => { total += (d.data()[`unread_${user.uid}`] || 0); });
                    setTotalUnreadMessages(total);
                }, ()=>{});

            /* ══ গ্লোবাল PRESENCE — যেকোনো স্ক্রিনে অনলাইন দেখাবে ══ */
            const updatePresence = () => {
                db.collection('presence').doc(user.uid).set({
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    online: true
                }, { merge: true }).catch(()=>{});
            };
            updatePresence();
            const presenceInterval = setInterval(updatePresence, 20000);
            const handleVisibilityChange = () => {
                if (document.visibilityState === 'visible') {
                    updatePresence();
                } else {
                    db.collection('presence').doc(user.uid).set({
                        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                        online: false
                    }, { merge: true }).catch(()=>{});
                }
            };
            document.addEventListener('visibilitychange', handleVisibilityChange);
            window.addEventListener('focus', updatePresence);
            window.addEventListener('beforeunload', () => {
                db.collection('presence').doc(user.uid).set({ online: false }, { merge: true }).catch(()=>{});
            });
            /* ইনকামিং কল listener — রিং + নোটিফিকেশন সহ */
            const incomingRingRef = { current: null };
            const lastCallIdRef = { current: null };

            const startIncomingRing = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const playRing = () => {
                        const times = [[0,0.15],[0.2,0.15],[0.5,0.15],[0.7,0.15]];
                        times.forEach(([start, dur]) => {
                            const o = ctx.createOscillator();
                            const g = ctx.createGain();
                            o.connect(g); g.connect(ctx.destination);
                            o.frequency.value = 1000;
                            o.type = 'sine';
                            g.gain.setValueAtTime(0.4, ctx.currentTime + start);
                            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
                            o.start(ctx.currentTime + start);
                            o.stop(ctx.currentTime + start + dur + 0.01);
                        });
                    };
                    playRing();
                    incomingRingRef.current = setInterval(playRing, 2500);
                } catch(e) {}
            };

            const stopIncomingRing = () => {
                if (incomingRingRef.current) {
                    clearInterval(incomingRingRef.current);
                    incomingRingRef.current = null;
                }
            };

            const unsubCalls = db.collection('calls')
                .where('receiverId','==', user.uid)
                .where('status','==','calling')
                .onSnapshot(snap => {
                    if (snap.empty) {
                        setIncomingCall(null);
                        stopIncomingRing();
                        return;
                    }
                    const callDoc = snap.docs[0];
                    const data = callDoc.data();

                    /* ৩০ সেকেন্ডের বেশি পুরনো কল এড়াও */
                    if (data.createdAt && data.createdAt.toDate) {
                        const age = (Date.now() - data.createdAt.toDate().getTime()) / 1000;
                        if (age > 30) return;
                    }

                    /* নতুন কল এলে রিং শুরু করো */
                    if (lastCallIdRef.current !== callDoc.id) {
                        lastCallIdRef.current = callDoc.id;
                        stopIncomingRing();
                        startIncomingRing();

                        /* ব্রাউজার নোটিফিকেশন — ব্যাকগ্রাউন্ডেও দেখাবে */
                        showBrowserNotif(
                            data.callType==='video' ? '📹 ভিডিও কল আসছে!' : '📞 অডিও কল আসছে!',
                            (data.callerName || 'কেউ') + ' কল করছেন — ট্যাপ করুন',
                            'emergency'
                        );
                    }

                    setIncomingCall({ callId: callDoc.id, ...data });
                }, ()=>{});
            return () => {
                unsubDonors(); unsubNotices(); unsubChats(); unsubCalls(); stopIncomingRing();
                clearInterval(presenceInterval);
                document.removeEventListener('visibilitychange', handleVisibilityChange);
                window.removeEventListener('focus', updatePresence);
                db.collection('presence').doc(user.uid).set({ online: false }, { merge: true }).catch(()=>{});
            };
        }, [user]);

        /* ══ Auth State ══ */
        const [authSubMode, setAuthSubMode] = useState('phone'); // 'phone' | 'email' | 'google'
        const [regEmail, setRegEmail] = useState('');
        const [regPassword, setRegPassword] = useState('');
        const [regConfirmPassword, setRegConfirmPassword] = useState('');
        const [loginEmail, setLoginEmail] = useState('');
        const [loginPassword, setLoginPassword] = useState('');
        const [showRegPass, setShowRegPass] = useState(false);
        const [showLoginPass, setShowLoginPass] = useState(false);
        const [needsProfileSetup, setNeedsProfileSetup] = useState(false);

        const handleRegister = async () => {
            if (!formData.name) return showToast("নাম দিন","error");
            if (authSubMode === 'phone') {
                const cleanPhone = formData.phone.replace(/\D/g,'');
                if (cleanPhone.length !== 11) return showToast("মোবাইল নম্বর অবশ্যই ১১ সংখ্যার হতে হবে।","error");
                if (!regPassword || regPassword.length < 6) return showToast("পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে","error");
                if (regPassword !== regConfirmPassword) return showToast("পাসওয়ার্ড মিলছে না","error");
                setLoading(true);
                try {
                    const email = `${cleanPhone}@bloodapp.com`;
                    let res;
                    try { res = await auth.createUserWithEmailAndPassword(email, regPassword); }
                    catch(e) {
                        if (e.code === 'auth/email-already-in-use') return showToast("এই নম্বরে আগেই অ্যাকাউন্ট আছে। লগইন করুন।","error");
                        throw e;
                    }
                    await db.collection('donors').doc(res.user.uid).set({...formData, phone:cleanPhone, uid:res.user.uid, authMethod:'phone'});
                    showToast("রেজিষ্ট্রেশন সফল হয়েছে! ✅","success");
                } catch(e) { showToast("ব্যর্থ: "+e.message,"error"); }
                setLoading(false);
            } else if (authSubMode === 'email') {
                if (!regEmail || !regEmail.includes('@')) return showToast("সঠিক ইমেইল দিন","error");
                if (!regPassword || regPassword.length < 6) return showToast("পাসওয়ার্ড কমপক্ষে ৬ অক্ষর হতে হবে","error");
                if (regPassword !== regConfirmPassword) return showToast("পাসওয়ার্ড মিলছে না","error");
                if (!formData.phone || formData.phone.replace(/\D/g,'').length !== 11) return showToast("মোবাইল নম্বর অবশ্যই ১১ সংখ্যার হতে হবে।","error");
                setLoading(true);
                try {
                    let res;
                    try { res = await auth.createUserWithEmailAndPassword(regEmail, regPassword); }
                    catch(e) {
                        if (e.code === 'auth/email-already-in-use') return showToast("এই ইমেইলে আগেই অ্যাকাউন্ট আছে। লগইন করুন।","error");
                        throw e;
                    }
                    const cleanPhone = formData.phone.replace(/\D/g,'');
                    await db.collection('donors').doc(res.user.uid).set({...formData, phone:cleanPhone, email:regEmail, uid:res.user.uid, authMethod:'email'});
                    showToast("রেজিষ্ট্রেশন সফল হয়েছে! ✅","success");
                } catch(e) { showToast("ব্যর্থ: "+e.message,"error"); }
                setLoading(false);
            }
        };

        const handleLogin = async () => {
            if (authSubMode === 'phone') {
                if (!loginName || !phoneNumber) return showToast("নাম ও মোবাইল দিন","error");
                const cleanPhone = phoneNumber.replace(/\D/g,'');
                if (cleanPhone.length !== 11) return showToast("মোবাইল নম্বর অবশ্যই ১১ সংখ্যার হতে হবে।","error");
                if (!loginPassword) return showToast("পাসওয়ার্ড দিন","error");
                setLoading(true);
                try {
                    const q = await db.collection('donors').where('phone','==',cleanPhone).get();
                    if (q.empty) { setLoading(false); return showToast("এই নম্বরে কোনো অ্যাকাউন্ট নেই।","error"); }
                    const email = `${cleanPhone}@bloodapp.com`;
                    await auth.signInWithEmailAndPassword(email, loginPassword);
                } catch(e) {
                    const msg = e.code === 'auth/wrong-password' ? "পাসওয়ার্ড ভুল হয়েছে" : "লগইন ব্যর্থ: "+e.message;
                    showToast(msg,"error");
                }
                setLoading(false);
            } else if (authSubMode === 'email') {
                if (!loginEmail || !loginPassword) return showToast("ইমেইল ও পাসওয়ার্ড দিন","error");
                setLoading(true);
                try {
                    await auth.signInWithEmailAndPassword(loginEmail, loginPassword);
                } catch(e) {
                    const msg = e.code === 'auth/wrong-password' ? "পাসওয়ার্ড ভুল হয়েছে" : e.code === 'auth/user-not-found' ? "এই ইমেইলে কোনো অ্যাকাউন্ট নেই" : "লগইন ব্যর্থ: "+e.message;
                    showToast(msg,"error");
                }
                setLoading(false);
            }
        };

        const handleGoogleAuth = async () => {
            setLoading(true);
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const res = await auth.signInWithPopup(provider);
                const uid = res.user.uid;
                const doc = await db.collection('donors').doc(uid).get();
                if (!doc.exists) {
                    /* নতুন Google ইউজার — প্রোফাইল সেটআপ দরকার */
                    const gName = res.user.displayName || '';
                    const gPhoto = res.user.photoURL || '';
                    const gEmail = res.user.email || '';
                    setFormData(f=>({...f, name:gName, image:gPhoto, email:gEmail}));
                    setNeedsProfileSetup(true);
                    await db.collection('donors').doc(uid).set({
                        name: gName, image: gPhoto, email: gEmail,
                        bloodGroup: 'A+', address: '', phone: '',
                        lastDonationDate: new Date().toISOString().split('T')[0],
                        uid, authMethod:'google', profileComplete: false
                    });
                } else {
                    const d = doc.data();
                    if (!d.profileComplete) setNeedsProfileSetup(true);
                }
                showToast("Google দিয়ে লগইন সফল! ✅","success");
            } catch(e) {
                if (e.code !== 'auth/popup-closed-by-user') showToast("Google লগইন ব্যর্থ: "+e.message,"error");
            }
            setLoading(false);
        };

        const handleForgotPassword = async () => {
            const email = loginEmail || prompt("আপনার ইমেইল দিন:");
            if (!email) return;
            try {
                await auth.sendPasswordResetEmail(email);
                showToast("পাসওয়ার্ড রিসেট ইমেইল পাঠানো হয়েছে ✅","success");
            } catch(e) { showToast("ব্যর্থ: "+e.message,"error"); }
        };

        const handleImageChange = e => {
            const file = e.target.files[0];
            if (file && file.size < 500000) { const r=new FileReader(); r.onloadend=()=>setFormData(f=>({...f,image:r.result})); r.readAsDataURL(file); }
            else alert("ছবি ৫০০কেবি-র কম হতে হবে।");
        };

        const handleSaveProfile = async () => {
            setLoading(true);
            await db.collection('donors').doc(user.uid).set(formData,{merge:true});
            setCurrentDonorData(formData);
            setLoading(false); setIsEditModalOpen(false);
            showToast("প্রোফাইল আপডেট হয়েছে! ✅","success");
        };

        const filteredDonors = donors.filter(d => {
            const q = searchQuery.toLowerCase();
            return ((d.name||'').toLowerCase().includes(q)||(d.address||'').toLowerCase().includes(q)) && (filterGroup==='All'||d.bloodGroup===filterGroup);
        });

        const openChat = useCallback(donor => {
            setActiveChatDonor(donor);
            setShowChatList(false);
            setFabOpen(false);
            /* চ্যাট খুললে unread কাউন্ট রিসেট করো */
            if (user && donor) {
                const chatId = getChatId(user.uid, donor.id);
                db.collection('chats').doc(chatId).set({
                    [`unread_${user.uid}`]: 0,
                    [`seenBy_${user.uid}`]: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true }).catch(()=>{});
            }
        }, [user]);

        /* ── Profile Setup Modal for Google users ── */
        if (user && needsProfileSetup) {
            return (
                <div className="min-h-screen bg-gradient-to-br from-red-700 to-red-500 flex items-center justify-center p-4">
                    {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
                    <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
                        <div className="bg-gradient-to-r from-red-600 to-red-500 px-6 py-5 text-white text-center">
                            <div className="text-4xl mb-2">👤</div>
                            <h2 className="font-black text-lg">প্রোফাইল সম্পূর্ণ করুন</h2>
                            <p className="text-white/70 text-xs mt-1">Google দিয়ে লগইন সফল! এখন আপনার তথ্য পূরণ করুন</p>
                        </div>
                        <div className="p-6 space-y-3">
                            {formData.image && <div className="flex justify-center"><img src={formData.image} className="w-20 h-20 rounded-full border-4 border-red-200 object-cover"/></div>}
                            <div><label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">পূর্ণ নাম *</label>
                                <input type="text" className="w-full p-3 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={formData.name} onChange={e=>setFormData({...formData,name:e.target.value})} placeholder="আপনার নাম"/></div>
                            <div><label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">রক্তের গ্রুপ *</label>
                                <select className="w-full p-3 border border-gray-200 rounded-xl text-sm outline-none bg-white" value={formData.bloodGroup} onChange={e=>setFormData({...formData,bloodGroup:e.target.value})}>{BLOOD_GROUPS.map(g=><option key={g}>{g}</option>)}</select></div>
                            <div><label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">ঠিকানা *</label>
                                <input type="text" className="w-full p-3 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={formData.address} onChange={e=>setFormData({...formData,address:e.target.value})} placeholder="আপনার ঠিকানা"/></div>
                            <div>
                                <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1">মোবাইল নম্বর *</label>
                                <input type="tel" maxLength={11} className="w-full p-3 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={formData.phone} onChange={e=>{const v=e.target.value.replace(/\D/g,'').slice(0,11);setFormData({...formData,phone:v});}} placeholder="১১ সংখ্যার মোবাইল"/>
                            </div>
                            <button onClick={async()=>{
                                if(!formData.name||!formData.bloodGroup||!formData.address) return showToast("সব তথ্য পূরণ করুন","error");
                                const cleanPhone = formData.phone.replace(/\D/g,'');
                                if(cleanPhone.length!==11) return showToast("মোবাইল নম্বর ১১ সংখ্যার হতে হবে","error");
                                setLoading(true);
                                await db.collection('donors').doc(user.uid).set({...formData, phone:cleanPhone, profileComplete:true},{merge:true});
                                setCurrentDonorData({...formData,phone:cleanPhone,profileComplete:true});
                                setNeedsProfileSetup(false);
                                setLoading(false);
                                showToast("প্রোফাইল সম্পূর্ণ হয়েছে! ✅","success");
                            }} className="w-full bg-gradient-to-r from-red-600 to-red-500 text-white py-3 rounded-xl font-bold text-sm shadow-lg">
                                {loading?"⏳ সেভ হচ্ছে...":"✅ প্রোফাইল সম্পূর্ণ করুন"}
                            </button>
                            <button onClick={()=>auth.signOut()} className="w-full text-gray-400 text-xs py-2">লগআউট করুন</button>
                        </div>
                    </div>
                </div>
            );
        }

        /* ── Login screen ── */
        if (!user) {
            const GoogleBtn = ({label}) => (
                <button onClick={handleGoogleAuth} disabled={loading} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-gray-300 text-gray-700 py-3 rounded-xl font-bold text-sm transition shadow-sm active:scale-95">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    {loading?"লোড হচ্ছে...":label}
                </button>
            );

            return (
                <div className="min-h-screen bg-gradient-to-br from-red-700 via-red-600 to-rose-500 flex items-center justify-center p-4">
                    {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
                    <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden">
                        {/* Header */}
                        <div className="bg-gradient-to-br from-red-700 to-red-500 px-6 pt-8 pb-6 text-center relative overflow-hidden">
                            <div className="absolute inset-0 opacity-10" style={{backgroundImage:'radial-gradient(circle at 20% 50%, white 1px, transparent 1px), radial-gradient(circle at 80% 20%, white 1px, transparent 1px)',backgroundSize:'30px 30px'}}/>
                            <div className="text-5xl mb-2 relative">🩸</div>
                            <h1 className="text-2xl font-black text-white relative">রক্ত যোদ্ধা পরিবার</h1>
                            <p className="text-white/60 text-xs mt-1 relative">জীবন বাঁচাতে এগিয়ে আসুন</p>
                        </div>

                        <div className="p-5 space-y-4">
                            {/* Tab: Register / Login */}
                            <div className="flex bg-gray-100 p-1 rounded-2xl">
                                <button onClick={()=>setAuthMode('register')} className={`flex-1 py-2.5 rounded-xl text-sm font-black transition ${authMode==='register'?'bg-white text-red-600 shadow':'text-gray-400'}`}>রেজিষ্ট্রেশন</button>
                                <button onClick={()=>setAuthMode('login')} className={`flex-1 py-2.5 rounded-xl text-sm font-black transition ${authMode==='login'?'bg-white text-red-600 shadow':'text-gray-400'}`}>লগইন</button>
                            </div>

                            {/* Sub method: Phone / Email */}
                            <div className="flex gap-2">
                                <button onClick={()=>setAuthSubMode('phone')} className={`flex-1 py-2 rounded-xl text-xs font-bold border-2 transition ${authSubMode==='phone'?'border-red-500 bg-red-50 text-red-600':'border-gray-200 text-gray-400'}`}>📱 মোবাইল</button>
                                <button onClick={()=>setAuthSubMode('email')} className={`flex-1 py-2 rounded-xl text-xs font-bold border-2 transition ${authSubMode==='email'?'border-red-500 bg-red-50 text-red-600':'border-gray-200 text-gray-400'}`}>📧 ইমেইল</button>
                            </div>

                            {authMode==='register' ? (
                                <div className="space-y-3">
                                    <input type="text" placeholder="পূর্ণ নাম *" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" onChange={e=>setFormData({...formData,name:e.target.value})}/>
                                    <select className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none" onChange={e=>setFormData({...formData,bloodGroup:e.target.value})}>{BLOOD_GROUPS.map(g=><option key={g}>{g}</option>)}</select>
                                    <input type="text" placeholder="ঠিকানা *" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" onChange={e=>setFormData({...formData,address:e.target.value})}/>

                                    {authSubMode==='phone' ? (
                                        <div>
                                            <input type="tel" placeholder="মোবাইল (১১ সংখ্যা) *" maxLength={11}
                                                className={`w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none focus:ring-2 ${formData.phone.replace(/\D/g,'').length===11?'border-green-400 focus:ring-green-200':formData.phone.replace(/\D/g,'').length>0?'border-red-300':'border-gray-200 focus:ring-red-200'}`}
                                                value={formData.phone} onChange={e=>{const v=e.target.value.replace(/\D/g,'').slice(0,11);setFormData({...formData,phone:v});}}/>
                                            <div className="flex justify-between mt-1 px-1">
                                                {formData.phone.replace(/\D/g,'').length>0&&formData.phone.replace(/\D/g,'').length!==11?<span className="text-xs text-red-400 font-bold">❌ ঠিক ১১ সংখ্যা দিন</span>:formData.phone.replace(/\D/g,'').length===11?<span className="text-xs text-green-500 font-bold">✅ সঠিক</span>:<span/>}
                                                <span className={`text-xs font-bold ${formData.phone.replace(/\D/g,'').length===11?'text-green-500':formData.phone.replace(/\D/g,'').length>0?'text-red-400':'text-gray-300'}`}>{formData.phone.replace(/\D/g,'').length}/১১</span>
                                            </div>
                                        </div>
                                    ) : (
                                        <>
                                            <input type="email" placeholder="ইমেইল ঠিকানা *" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={regEmail} onChange={e=>setRegEmail(e.target.value)}/>
                                            <div>
                                                <input type="tel" placeholder="মোবাইল (১১ সংখ্যা) *" maxLength={11}
                                                    className={`w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none focus:ring-2 ${formData.phone.replace(/\D/g,'').length===11?'border-green-400':'border-gray-200 focus:ring-red-200'}`}
                                                    value={formData.phone} onChange={e=>{const v=e.target.value.replace(/\D/g,'').slice(0,11);setFormData({...formData,phone:v});}}/>
                                            </div>
                                        </>
                                    )}

                                    <div className="relative">
                                        <input type={showRegPass?"text":"password"} placeholder="পাসওয়ার্ড (কমপক্ষে ৬ অক্ষর) *" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200 pr-12" value={regPassword} onChange={e=>setRegPassword(e.target.value)}/>
                                        <button onClick={()=>setShowRegPass(!showRegPass)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">{showRegPass?"🙈":"👁️"}</button>
                                    </div>
                                    <div className="relative">
                                        <input type={showRegPass?"text":"password"} placeholder="পাসওয়ার্ড নিশ্চিত করুন *" className={`w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none focus:ring-2 pr-12 ${regConfirmPassword&&regPassword!==regConfirmPassword?'border-red-300 focus:ring-red-200':'border-gray-200 focus:ring-red-200'}`} value={regConfirmPassword} onChange={e=>setRegConfirmPassword(e.target.value)}/>
                                        {regConfirmPassword && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm">{regPassword===regConfirmPassword?"✅":"❌"}</span>}
                                    </div>
                                    <button onClick={handleRegister} disabled={loading} className="w-full bg-gradient-to-r from-red-600 to-red-500 text-white py-3 rounded-xl font-black text-sm shadow-lg disabled:opacity-60 transition active:scale-95">
                                        {loading?"⏳ অপেক্ষা করুন...":"✅ রেজিষ্ট্রেশন করুন"}
                                    </button>
                                    <div className="flex items-center gap-3"><div className="flex-1 h-px bg-gray-200"/><span className="text-xs text-gray-400 font-bold">অথবা</span><div className="flex-1 h-px bg-gray-200"/></div>
                                    <GoogleBtn label="Google দিয়ে রেজিষ্ট্রেশন"/>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    {authSubMode==='phone' ? (
                                        <>
                                            <input type="text" placeholder="রেজিস্ট্রেশনকৃত নাম *" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={loginName} onChange={e=>setLoginName(e.target.value)}/>
                                            <div>
                                                <input type="tel" placeholder="মোবাইল নম্বর (১১ সংখ্যা) *" maxLength={11}
                                                    className={`w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none focus:ring-2 ${phoneNumber.replace(/\D/g,'').length===11?'border-green-400 focus:ring-green-200':phoneNumber.replace(/\D/g,'').length>0?'border-red-300':'border-gray-200 focus:ring-red-200'}`}
                                                    value={phoneNumber} onChange={e=>{const v=e.target.value.replace(/\D/g,'').slice(0,11);setPhoneNumber(v);}}/>
                                                <div className="flex justify-between mt-1 px-1">
                                                    {phoneNumber.replace(/\D/g,'').length>0&&phoneNumber.replace(/\D/g,'').length!==11?<span className="text-xs text-red-400 font-bold">❌ ঠিক ১১ সংখ্যা দিন</span>:phoneNumber.replace(/\D/g,'').length===11?<span className="text-xs text-green-500 font-bold">✅ সঠিক</span>:<span/>}
                                                    <span className={`text-xs font-bold ${phoneNumber.replace(/\D/g,'').length===11?'text-green-500':phoneNumber.replace(/\D/g,'').length>0?'text-red-400':'text-gray-300'}`}>{phoneNumber.replace(/\D/g,'').length}/১১</span>
                                                </div>
                                            </div>
                                        </>
                                    ) : (
                                        <input type="email" placeholder="ইমেইল ঠিকানা *" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200" value={loginEmail} onChange={e=>setLoginEmail(e.target.value)}/>
                                    )}
                                    <div className="relative">
                                        <input type={showLoginPass?"text":"password"} placeholder="পাসওয়ার্ড *" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none focus:ring-2 focus:ring-red-200 pr-12" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)}/>
                                        <button onClick={()=>setShowLoginPass(!showLoginPass)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg">{showLoginPass?"🙈":"👁️"}</button>
                                    </div>
                                    {authSubMode==='email' && <button onClick={handleForgotPassword} className="text-right w-full text-xs text-red-500 font-bold hover:text-red-700">পাসওয়ার্ড ভুলে গেছেন?</button>}
                                    <button onClick={handleLogin} disabled={loading} className="w-full bg-gradient-to-r from-red-600 to-red-500 text-white py-3 rounded-xl font-black text-sm shadow-lg disabled:opacity-60 transition active:scale-95">
                                        {loading?"⏳ লগইন হচ্ছে...":"🔓 লগইন করুন"}
                                    </button>
                                    <div className="flex items-center gap-3"><div className="flex-1 h-px bg-gray-200"/><span className="text-xs text-gray-400 font-bold">অথবা</span><div className="flex-1 h-px bg-gray-200"/></div>
                                    <GoogleBtn label="Google দিয়ে লগইন"/>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        /* ── Main screen ── */
        return (
            <div className="pb-36">
                {/* Toast */}
                {toast && <Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
                {/* Push Notification Permission Banner */}
                <PushPermissionBanner userId={user?.uid} donorData={currentDonorData}/>

                {/* ইনকামিং কল ব্যানার */}
                {incomingCall && !activeGlobalCall && (
                    <IncomingCallBanner
                        callData={incomingCall}
                        currentUser={user}
                        onAccept={() => {
                            setActiveGlobalCall({ callType: incomingCall.callType, existingCallId: incomingCall.callId, caller: incomingCall });
                            setIncomingCall(null);
                        }}
                        onReject={async () => {
                            try { await db.collection('calls').doc(incomingCall.callId).update({ status:'rejected' }); } catch(e){}
                            setIncomingCall(null);
                        }}
                    />
                )}

                {/* গ্লোবাল কল স্ক্রিন (ইনকামিং অ্যাকসেপ্ট করলে) */}
                {activeGlobalCall && (
                    <CallScreen
                        currentUser={user}
                        currentDonorData={currentDonorData}
                        recipient={donors.find(d=>d.id===activeGlobalCall.caller?.callerId) || { id: activeGlobalCall.caller?.callerId, name: activeGlobalCall.caller?.callerName, image: activeGlobalCall.caller?.callerImage, bloodGroup:'', address:'' }}
                        callType={activeGlobalCall.callType}
                        existingCallId={activeGlobalCall.existingCallId}
                        onEnd={() => setActiveGlobalCall(null)}
                    />
                )}

                <header className="bg-red-600 text-white px-5 py-4 shadow-lg flex justify-between items-center sticky top-0 z-40">
                    <h1 className="text-lg font-black">রক্ত যোদ্ধা পরিবার</h1>
                    <div className="flex items-center gap-2">
                        {isAdmin && <button onClick={()=>setShowAdminPanel(true)} className="bg-white/20 w-9 h-9 rounded-full flex items-center justify-center hover:bg-white/30 transition text-base">🛡️</button>}
                        <button onClick={()=>auth.signOut()} className="bg-white/20 px-3 py-1 rounded-lg text-xs font-bold hover:bg-white/30 transition">লগআউট</button>
                    </div>
                </header>

                <main className="max-w-4xl mx-auto p-4 space-y-4">
                    {/* Quiz ও Fundraising */}
                    <div className="grid grid-cols-2 gap-2">
                        <button onClick={()=>setShowQuiz(true)} className="bg-blue-600 text-white rounded-2xl p-3 flex items-center gap-3 hover:bg-blue-700 transition shadow-sm">
                            <span className="text-2xl">🩸</span>
                            <div className="text-left">
                                <p className="text-xs font-black">রক্ত দিতে পারবেন?</p>
                                <p className="text-[10px] text-blue-100">যোগ্যতা যাচাই করুন</p>
                            </div>
                        </button>
                        <button onClick={()=>setShowFundraising(true)} className="text-white rounded-2xl p-3 flex items-center gap-3 transition shadow-sm" style={{background:'linear-gradient(135deg,#059669,#10b981)'}}>
                            <span className="text-2xl">💚</span>
                            <div className="text-left">
                                <p className="text-xs font-black">আর্থিক অনুদান</p>
                                <p className="text-[10px] text-green-100">বিকাশ/নগদে দিন</p>
                            </div>
                        </button>
                    </div>

                    <input type="text" placeholder="🔍  নাম বা ঠিকানা দিয়ে খুঁজুন..." className="w-full p-3 bg-white rounded-xl shadow-sm border focus:ring-2 focus:ring-red-200 outline-none" onChange={e=>setSearchQuery(e.target.value)}/>

                    <div className="flex gap-2 overflow-x-auto no-scrollbar">
                        <button onClick={()=>setFilterGroup('All')} className={`px-4 py-2 rounded-full text-sm font-bold flex-shrink-0 transition ${filterGroup==='All'?'bg-red-600 text-white':'bg-white'}`}>সব</button>
                        {BLOOD_GROUPS.map(g => <button key={g} onClick={()=>setFilterGroup(g)} className={`px-4 py-2 rounded-full text-sm font-bold flex-shrink-0 transition ${filterGroup===g?'bg-red-600 text-white':'bg-white'}`}>{g}</button>)}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {filteredDonors.map(donor => {
                            const { canDonate } = getDonationStatus(donor.lastDonationDate);
                            const isSelf = user.uid===donor.id;
                            return (
                                <div key={donor.id} className="bg-white p-4 rounded-2xl shadow-sm border hover:border-red-100 transition">
                                    <div className="flex items-center gap-3">
                                        <div onClick={()=>setViewingDonor(donor)} className={`w-14 h-14 rounded-full overflow-hidden flex-shrink-0 border-2 cursor-pointer ${canDonate?'border-green-400':'border-gray-200'}`}>
                                            {donor.image?<img src={donor.image} className="w-full h-full object-cover"/>:<div className="w-full h-full bg-red-50 flex items-center justify-center text-red-600 font-bold">{donor.bloodGroup}</div>}
                                        </div>
                                        <div className="flex-1 min-w-0 cursor-pointer" onClick={()=>setViewingDonor(donor)}>
                                            <div className="flex justify-between items-center gap-1">
                                                <h3 className="font-bold truncate text-sm">{donor.name}</h3>
                                                <div className="flex items-center gap-1 flex-shrink-0">
                                                    {donor.isDonorMember && <span className="text-[9px] bg-green-100 text-green-700 font-black px-1.5 py-0.5 rounded-full">💚</span>}
                                                    <span className="text-red-600 font-black text-xs">{donor.bloodGroup}</span>
                                                </div>
                                            </div>
                                            <p className="text-xs text-gray-500 truncate">📍 {donor.address}</p>
                                            <p className={`text-[10px] font-bold mt-1 ${canDonate?'text-green-600':'text-red-400'}`}>{canDonate?'✅ রক্ত দিতে পারবেন':'⏳ এখন দিতে পারবেন না'}</p>
                                        </div>
                                        {!isSelf && (
                                            <div className="flex flex-col gap-1 flex-shrink-0">
                                                <button onClick={()=>openChat(donor)} className="w-9 h-9 bg-indigo-50 hover:bg-indigo-100 rounded-full flex items-center justify-center text-base transition">💬</button>
                                                <a href={`tel:${donor.phone}`} className="w-9 h-9 bg-green-50 hover:bg-green-100 rounded-full flex items-center justify-center text-base transition">📞</a>
                                            </div>
                                        )}
                                        {isSelf && <div className="flex-shrink-0"><CountdownCircle lastDonationDate={donor.lastDonationDate} size={52}/></div>}
                                    </div>
                                </div>
                            );
                        })}
                        {filteredDonors.length===0 && <div className="col-span-2 text-center py-16 text-gray-400"><p className="text-4xl mb-3">🩸</p><p className="font-bold">কোনো ডোনার পাওয়া যায়নি</p></div>}
                    </div>
                </main>

                {/* ══ BOTTOM NAVIGATION BAR ══ */}
                <div className="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-gray-200 shadow-2xl">
                    <div className="max-w-4xl mx-auto grid grid-cols-5 gap-0">
                        <button onClick={()=>setShowEmergency(true)} className="flex flex-col items-center justify-center py-3 gap-0.5 hover:bg-red-50 transition active:scale-95">
                            <span className="text-xl">🆘</span>
                            <span className="text-[9px] font-bold text-red-600">ইমার্জেন্সি</span>
                        </button>
                        <button onClick={()=>setShowNoticePanel(true)} className="flex flex-col items-center justify-center py-3 gap-0.5 hover:bg-amber-50 transition active:scale-95 relative">
                            <span className="text-xl">📢</span>
                            <span className="text-[9px] font-bold text-amber-600">নোটিফিকেশন</span>
                            {unreadNotices>0 && <span className="absolute top-1 right-4 w-4 h-4 bg-red-500 text-white text-[8px] font-black rounded-full flex items-center justify-center">{unreadNotices}</span>}
                        </button>
                        <button onClick={()=>setShowChatList(true)} className="flex flex-col items-center justify-center py-3 gap-0.5 hover:bg-indigo-50 transition active:scale-95 relative">
                            <span className="text-xl">💬</span>
                            <span className={`text-[9px] font-bold ${totalUnreadMessages>0?'text-red-600':'text-indigo-600'}`}>মেসেজ</span>
                            {totalUnreadMessages>0 && <span className="absolute top-1 right-3 w-4 h-4 bg-red-500 text-white text-[8px] font-black rounded-full flex items-center justify-center badge-pop">{totalUnreadMessages}</span>}
                        </button>
                        <button onClick={()=>setIsEditModalOpen(true)} className="flex flex-col items-center justify-center py-3 gap-0.5 hover:bg-gray-50 transition active:scale-95">
                            <div className="w-6 h-6 rounded-full overflow-hidden border-2 border-gray-300">
                                {formData.image ? <img src={formData.image} className="w-full h-full object-cover"/> : <div className="w-full h-full bg-gray-100 flex items-center justify-center text-[10px]">👤</div>}
                            </div>
                            <span className="text-[9px] font-bold text-gray-600">প্রোফাইল</span>
                        </button>
                        <button onClick={()=>setShowShareModal(true)} className="flex flex-col items-center justify-center py-3 gap-0.5 hover:bg-green-50 transition active:scale-95">
                            <span className="text-xl">🔗</span>
                            <span className="text-[9px] font-bold text-green-600">শেয়ার</span>
                        </button>
                    </div>
                </div>

                {/* ══ SHARE MODAL ══ */}
                {showShareModal && (
                    <div className="fixed inset-0 bg-black/60 z-[55] flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in">
                        <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl">
                            <div className="bg-gradient-to-r from-green-600 to-emerald-500 px-5 py-4 flex items-center justify-between text-white">
                                <div className="flex items-center gap-3"><span className="text-xl">🔗</span><h2 className="font-black">অ্যাপ শেয়ার করুন</h2></div>
                                <button onClick={()=>setShowShareModal(false)} className="bg-white/20 w-9 h-9 rounded-full flex items-center justify-center font-black text-xl">×</button>
                            </div>
                            <div className="p-5 space-y-3">
                                <p className="text-sm text-gray-600 text-center">বন্ধু ও পরিবারের সাথে রক্ত যোদ্ধা পরিবার শেয়ার করুন</p>
                                <ShareCopyBtn showToast={showToast} onClose={()=>setShowShareModal(false)}/>
                                <div className="grid grid-cols-2 gap-3 mt-2">
                                    <a href={`https://wa.me/?text=${encodeURIComponent('রক্ত যোদ্ধা পরিবার — জরুরি রক্তের সন্ধানে আমাদের সাথে যোগ দিন! '+window.location.href)}`}
                                        target="_blank" rel="noopener noreferrer"
                                        className="py-3 rounded-xl font-bold text-sm text-white text-center flex items-center justify-center gap-2" style={{background:'#25D366'}}>
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                        WhatsApp
                                    </a>
                                    <a href={`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`}
                                        target="_blank" rel="noopener noreferrer"
                                        className="py-3 rounded-xl font-bold text-sm text-white text-center flex items-center justify-center gap-2" style={{background:'#1877F2'}}>
                                        📘 Facebook
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* Modals */}
                {viewingDonor && <ProfileViewModal donor={viewingDonor} currentUser={user} onClose={()=>setViewingDonor(null)} onMessage={openChat}/>}
                {showNoticePanel && <NoticePanel notices={notices} isAdmin={isAdmin} onClose={()=>setShowNoticePanel(false)}/>}
                {showAdminPanel && <AdminPanel donors={donors} currentUid={user?.uid} onClose={()=>setShowAdminPanel(false)}/>}
                {showChatList && <ChatList currentUser={user} donors={donors} onOpenChat={openChat} onViewDonor={setViewingDonor} onClose={()=>setShowChatList(false)}/>}
                {activeChatDonor && <ChatWindow currentUser={user} currentDonorData={currentDonorData} recipient={activeChatDonor} onClose={()=>setActiveChatDonor(null)}/>}
                {showEmergency && <EmergencyPanel currentUser={user} currentDonorData={currentDonorData} donors={donors} onClose={()=>setShowEmergency(false)} showToast={showToast} onViewDonor={setViewingDonor}/>}
                {showInbox && <InboxPanel userId={user?.uid} inbox={inbox} unread={unreadInbox} markAllRead={markAllRead} donors={donors} onOpenChat={openChat} onClose={()=>setShowInbox(false)}/>}
                {showQuiz && <DonationQuiz onClose={()=>setShowQuiz(false)}/>}
                {showFundraising && <FundraisingPanel currentUser={user} currentDonorData={currentDonorData} onClose={()=>setShowFundraising(false)} showToast={showToast}/>}

                {isEditModalOpen && <ProfileUpdateModal formData={formData} setFormData={setFormData} fileInputRef={fileInputRef} handleImageChange={handleImageChange} onSave={handleSaveProfile} onClose={()=>setIsEditModalOpen(false)} loading={loading} user={user}/>}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
