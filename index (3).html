<script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const firebaseConfig = {
        apiKey: "AIzaSyAvmHp4u2kPpAKouDkmdBu0CtApWPwww8I",
        authDomain: "my-testapp-f82dd.firebaseapp.com",
        projectId: "my-testapp-f82dd",
        storageBucket: "my-testapp-f82dd.firebasestorage.app",
        messagingSenderId: "843818418308",
        appId: "1:843818418308:web:c85620cd163fd4ad9542d1"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    /* ══════════════════════════════════════════════
       পুশ নোটিফিকেশন সিস্টেম — Web Notification API
       FCM SDK ছাড়া, সব ব্রাউজারে কাজ করে
    ══════════════════════════════════════════════ */

    /* ব্রাউজার নোটিফিকেশন দেখাও */
    function showBrowserNotif(title, body, type) {
        try {
            if (!('Notification' in window)) return;
            if (Notification.permission !== 'granted') return;
            const icons = { emergency:'🆘', message:'💬', notice:'📢', reminder:'🩸' };
            const icon = icons[type] || '🔔';
            new Notification(icon + ' ' + title, {
                body: body,
                requireInteraction: type === 'emergency',
                vibrate: type === 'emergency' ? [300,100,300,100,300] : [200,100,200]
            });
        } catch(e) {}
    }

    /* পারমিশন নাও */
    async function askNotifPermission() {
        try {
            if (!('Notification' in window)) return false;
            if (Notification.permission === 'granted') return true;
            const p = await Notification.requestPermission();
            return p === 'granted';
        } catch(e) { return false; }
    }

    /* সব ইউজারের ইনবক্সে নোটিফিকেশন পাঠাও (Firestore এর মাধ্যমে) */
    async function broadcastToAllInbox(senderUid, type, title, preview, extra) {
        try {
            const snap = await db.collection('donors').get();
            const now = firebase.firestore.FieldValue.serverTimestamp();
            const batch = db.batch();
            snap.docs.forEach(doc => {
                const uid = doc.id;
                if (uid === senderUid) return;
                const ref = db.collection('userInbox').doc(uid)
                              .collection('notifications').doc();
                batch.set(ref, {
                    type,
                    title,
                    preview,
                    fromUid: senderUid,
                    fromName: (extra && extra.fromName) || 'রক্ত যোদ্ধা পরিবার',
                    fromImage: (extra && extra.fromImage) || '',
                    read: false,
                    createdAt: now
                });
            });
            await batch.commit();
        } catch(e) {}
    }

    /* ডোনেশন রিমাইন্ডার চেক */
    function checkDonationReminder(lastDonationDate) {
        if (!lastDonationDate) return;
        const last = new Date(lastDonationDate);
        const today = new Date();
        today.setHours(0,0,0,0); last.setHours(0,0,0,0);
        const daysPassed = Math.floor((today - last) / 86400000);
        if (daysPassed >= 90) {
            setTimeout(() => showBrowserNotif(
                'রক্তদানের সময় হয়েছে! 🎉',
                'আপনি এখন রক্ত দিতে পারবেন। একজন ডোনার হিসেবে এগিয়ে আসুন!',
                'reminder'
            ), 3000);
        } else if (daysPassed >= 83) {
            const daysLeft = 90 - daysPassed;
            setTimeout(() => showBrowserNotif(
                'রক্তদানের প্রস্তুতি নিন',
                'মাত্র ' + daysLeft + ' দিন পরেই আপনি আবার রক্ত দিতে পারবেন!',
                'reminder'
            ), 3000);
        }
    }

    const BLOOD_GROUPS = ["A+","A-","B+","B-","O+","O-","AB+","AB-"];
    const ADMIN_UID = "Kwbn8Es4fJSuOrrBo3HHHECIQrg1";
    const ADMIN_UIDS = ["Kwbn8Es4fJSuOrrBo3HHHECIQrg1"];

    /* ── ৯০ দিন হিসাব ── */
    function getDonationStatus(lastDonationDate) {
        if (!lastDonationDate) return { canDonate: true, daysLeft: 0, daysPassed: 0 };
        const last = new Date(lastDonationDate); const today = new Date();
        today.setHours(0,0,0,0); last.setHours(0,0,0,0);
        const daysPassed = Math.floor((today - last) / 86400000);
        return { canDonate: daysPassed >= 90, daysLeft: Math.max(0,90-daysPassed), daysPassed };
    }

    /* ── Toast ── */
    function Toast({ msg, type, onClose }) {
        useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
        const bg = type==='success' ? 'bg-green-600' : type==='error' ? 'bg-red-600' : 'bg-indigo-600';
        return (
            <div className={`fixed top-5 left-1/2 -translate-x-1/2 z-[200] ${bg} text-white px-5 py-3 rounded-2xl shadow-2xl text-sm font-bold toast flex items-center gap-2 max-w-xs`}>
                <span>{type==='success'?'✅':type==='error'?'❌':'ℹ️'}</span>{msg}
            </div>
        );
    }

    /* ── Countdown Circle ── */
    function CountdownCircle({ lastDonationDate, size=80 }) {
        const { canDonate, daysLeft, daysPassed } = getDonationStatus(lastDonationDate);
        const r = (size/2)-7; const circ = 2*Math.PI*r;
        const dash = circ * Math.min(1, daysPassed/90);
        const color = canDonate ? '#22c55e' : daysPassed/90 > 0.6 ? '#f59e0b' : '#ef4444';
        return (
            <div className="flex flex-col items-center gap-0.5">
                <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
                    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#e5e7eb" strokeWidth="6"/>
                    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="6"
                        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray 0.8s ease'}}/>
                    <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
                        style={{transformOrigin:`${size/2}px ${size/2}px`, transform:'rotate(90deg)', fill:color, fontWeight:900, fontSize:size<70?'10px':'13px', fontFamily:'Inter'}}>
                        {canDonate ? '✓' : daysLeft}
                    </text>
                </svg>
                <span className="text-[9px] font-bold text-gray-400">{canDonate?'প্রস্তুত':'দিন বাকি'}</span>
            </div>
        );
    }

    /* ── DonationBadge ── */
    function DonationBadge({ lastDonationDate, large }) {
        const { canDonate, daysLeft, daysPassed } = getDonationStatus(lastDonationDate);
        const pct = Math.min(100, Math.round((daysPassed/90)*100));
        return canDonate
            ? <div className="flex items-center gap-2 bg-green-50 border border-green-200 rounded-xl px-3 py-2">
                <span className={`w-3 h-3 rounded-full bg-green-500 flex-shrink-0 ${large?'pulse-green':''}`}></span>
                <span className={`text-green-700 font-bold ${large?'text-sm':'text-xs'}`}>✅ আপনি রক্ত দিতে পারবেন</span>
              </div>
            : <div className="space-y-2">
                <div className="flex items-center gap-2 bg-red-50 border border-red-200 rounded-xl px-3 py-2">
                    <span className="w-3 h-3 rounded-full bg-red-400 flex-shrink-0"></span>
                    <span className={`text-red-600 font-bold ${large?'text-sm':'text-xs'}`}>⏳ আরও <span className="font-black underline">{daysLeft} দিন</span> বাকি</span>
                </div>
                {large && <div><div className="flex justify-between text-[10px] text-gray-400 mb-1"><span>পুনরুদ্ধার</span><span>{pct}%</span></div>
                    <div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-red-400 to-amber-400 rounded-full progress-bar" style={{width:`${pct}%`}}></div></div></div>}
              </div>;
    }

    function InfoRow({ icon, label, value }) {
        return (
            <div className="flex items-center gap-3 bg-gray-50 rounded-xl p-3">
                <span className="text-xl w-8 text-center">{icon}</span>
                <div><p className="text-[10px] text-gray-400 font-bold uppercase tracking-wide">{label}</p><p className="text-sm font-bold text-gray-800">{value||"—"}</p></div>
            </div>
        );
    }

    function ShareCopyBtn({ showToast, onClose }) {
        const [copied, setCopied] = useState(false);
        const url = window.location.href;
        const handleCopy = () => {
            const el = document.createElement('textarea'); el.value = url; el.style.position='fixed'; el.style.opacity='0';
            document.body.appendChild(el); el.focus(); el.select();
            try { document.execCommand('copy'); } catch(e) {}
            document.body.removeChild(el);
            if (navigator.clipboard) navigator.clipboard.writeText(url).catch(()=>{});
            setCopied(true); showToast('লিংক কপি হয়েছে! ✅','success');
            setTimeout(()=>setCopied(false), 2500);
        };
        return (
            <button onClick={handleCopy} className={`w-full py-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition ${copied?'bg-green-500 text-white':'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                {copied ? '✅ লিংক কপি হয়েছে!' : '📋 লিংক কপি করুন'}
            </button>
        );
    }

    /* ══════════════════════════════
       DONATION ELIGIBILITY QUIZ
    ══════════════════════════════ */
    const QUIZ_QUESTIONS = [
        { id:'weight', q:'আপনার ওজন কি ৫০ কেজির বেশি?', pass: v=>v==='yes' },
        { id:'age', q:'আপনার বয়স কি ১৮ থেকে ৬০ বছরের মধ্যে?', pass: v=>v==='yes' },
        { id:'medicine', q:'গত ৪৮ ঘণ্টায় কোনো ওষুধ খেয়েছেন?', pass: v=>v==='no' },
        { id:'illness', q:'গত ১ মাসে কোনো বড় অসুখ হয়েছিল?', pass: v=>v==='no' },
        { id:'donated', q:'গত ৯০ দিনের মধ্যে রক্ত দিয়েছেন?', pass: v=>v==='no' },
        { id:'pregnant', q:'আপনি কি এখন গর্ভবতী বা স্তন্যদানকারী?', pass: v=>v==='no' },
        { id:'alcohol', q:'গত ২৪ ঘণ্টায় মদ বা নেশাজাতীয় দ্রব্য গ্রহণ করেছেন?', pass: v=>v==='no' },
    ];
    function DonationQuiz({ onClose }) {
        const [step, setStep] = useState(0);
        const [answers, setAnswers] = useState({});
        const [result, setResult] = useState(null);

        const answer = (val) => {
            const q = QUIZ_QUESTIONS[step];
            const newAns = { ...answers, [q.id]: val };
            setAnswers(newAns);
            if (!q.pass(val)) {
                setResult('no');
                return;
            }
            if (step + 1 >= QUIZ_QUESTIONS.length) {
                setResult('yes');
            } else {
                setStep(step + 1);
            }
        };

        const progress = Math.round((step / QUIZ_QUESTIONS.length) * 100);

        return (
            <div className="fixed inset-0 bg-black/60 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in">
                <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl">
                    <div className="bg-gradient-to-r from-red-600 to-rose-500 px-5 py-4 flex items-center justify-between text-white">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl">🩸</div>
                            <div><h2 className="font-black">রক্তদান যোগ্যতা যাচাই</h2><p className="text-[10px] text-white/70">সহজ কিছু প্রশ্নের উত্তর দিন</p></div>
                        </div>
                        <button onClick={onClose} className="bg-white/20 w-9 h-9 rounded-full flex items-center justify-center font-black text-xl">×</button>
                    </div>

                    {!result ? (
                        <div className="p-6 space-y-5">
                            <div>
                                <div className="flex justify-between text-xs text-gray-400 mb-1 font-bold">
                                    <span>প্রশ্ন {step+1} / {QUIZ_QUESTIONS.length}</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                                    <div className="h-full bg-red-500 rounded-full progress-bar" style={{width:`${progress}%`}}/>
                                </div>
                            </div>
                            <p className="text-gray-800 font-bold text-base text-center py-4">{QUIZ_QUESTIONS[step].q}</p>
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={()=>answer('yes')} className="py-4 bg-green-50 border-2 border-green-200 hover:border-green-400 text-green-700 rounded-2xl font-black text-lg transition">✅ হ্যাঁ</button>
                                <button onClick={()=>answer('no')} className="py-4 bg-red-50 border-2 border-red-200 hover:border-red-400 text-red-600 rounded-2xl font-black text-lg transition">❌ না</button>
                            </div>
                        </div>
                    ) : (
                        <div className="p-8 text-center space-y-4 bounce-in">
                            {result === 'yes' ? (
                                <>
                                    <div className="text-6xl">🎉</div>
                                    <h3 className="text-2xl font-black text-green-600">আপনি রক্ত দিতে পারবেন!</h3>
                                    <p className="text-sm text-gray-500">আপনার সব উত্তর ঠিক আছে। নিকটস্থ রক্তদান কেন্দ্রে যোগাযোগ করুন।</p>
                                    <div className="bg-green-50 border border-green-200 rounded-2xl p-4 text-xs text-green-700 font-bold">✅ রক্তদানের আগে পর্যাপ্ত পানি পান করুন এবং ভালো খাবার খান</div>
                                </>
                            ) : (
                                <>
                                    <div className="text-6xl">😔</div>
                                    <h3 className="text-2xl font-black text-red-500">এখন রক্ত দেওয়া সম্ভব নয়</h3>
                                    <p className="text-sm text-gray-500">আপনার একটি উত্তর যোগ্যতার শর্ত পূরণ করেনি। পরবর্তীতে আবার চেষ্টা করুন।</p>
                                    <div className="bg-red-50 border border-red-200 rounded-2xl p-4 text-xs text-red-600 font-bold">ℹ️ চিকিৎসক বা রক্তদান কেন্দ্রে পরামর্শ নিতে পারেন</div>
                                </>
                            )}
                            <button onClick={onClose} className="w-full py-3 bg-red-600 text-white rounded-xl font-bold mt-2">ঠিক আছে</button>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    /* ══════════════════════════════
       FUNDRAISING / DONATION PANEL
    ══════════════════════════════ */
    const BKASH_NUMBER = '01953621719';
    const NAGAD_NUMBER = '01953621719';

    function CopyNumberBtn({ number, label, color }) {
        const [copied, setCopied] = useState(false);
        const handleCopy = () => {
            const txt = number;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(txt).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); }).catch(()=>fallback());
            } else { fallback(); }
            function fallback() {
                const el = document.createElement('textarea'); el.value = txt; el.style.position='fixed'; el.style.opacity='0';
                document.body.appendChild(el); el.focus(); el.select();
                try { document.execCommand('copy'); setCopied(true); setTimeout(()=>setCopied(false),2000); } catch(e){}
                document.body.removeChild(el);
            }

    /* ── মেইন কল স্ক্রিন ── */
    function CallScreen({ currentUser, currentDonorData, recipient, callType, existingCallId, onEnd }) {
        const [callStatus, setCallStatus] = useState(existingCallId ? 'connecting' : 'calling');
        const [isMuted, setIsMuted] = useState(false);
        const [isCamOff, setIsCamOff] = useState(false);
        const [isSpeaker, setIsSpeaker] = useState(true);
        const [callDuration, setCallDuration] = useState(0);
        const [facingMode, setFacingMode] = useState('user'); // 'user' | 'environment'

        const localVideoRef = useRef(null);
        const remoteVideoRef = useRef(null);
        const pcRef = useRef(null);
        const localStreamRef = useRef(null);
        const callDocRef = useRef(null);
        const timerRef = useRef(null);
        const unsubsRef = useRef([]);
        const ringAudioRef = useRef(null);
        const callStartTimeRef = useRef(null);

        /* ── রিং সাউন্ড ── */
        const startRing = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const playBeep = (freq, start, dur) => {
                    const o = ctx.createOscillator();
                    const g = ctx.createGain();
                    o.connect(g); g.connect(ctx.destination);
                    o.frequency.value = freq;
                    g.gain.setValueAtTime(0.3, ctx.currentTime + start);
                    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
                    o.start(ctx.currentTime + start);
                    o.stop(ctx.currentTime + start + dur);
                };
                const ring = () => {
                    playBeep(880, 0, 0.3);
                    playBeep(660, 0.4, 0.3);
                    playBeep(880, 0.8, 0.3);
                    playBeep(660, 1.2, 0.3);
                };
                ring();
                ringAudioRef.current = setInterval(ring, 2000);
                return () => { clearInterval(ringAudioRef.current); try { ctx.close(); } catch(e){} };
            } catch(e) { return () => {}; }
        };

        const stopRing = () => {
            if (ringAudioRef.current) clearInterval(ringAudioRef.current);
        };

        /* ── কল টাইমার ── */
        useEffect(() => {
            if (callStatus === 'connected') {
                stopRing();
                callStartTimeRef.current = Date.now();
                timerRef.current = setInterval(() => setCallDuration(d => d + 1), 1000);
            }
            return () => clearInterval(timerRef.current);
        }, [callStatus]);

        const fmtDuration = s => {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return m + ':' + sec;
        };

        /* ── চ্যাটে কল লগ সেভ — একবারই হবে ── */
        const callLogSavedRef = useRef(false);
        const saveCallLog = async (status) => {
            if (callLogSavedRef.current) return; // ২ বার সেভ হওয়া বন্ধ
            callLogSavedRef.current = true;
            try {
                const chatId = [currentUser.uid, recipient.id].sort().join('__');
                const duration = callStartTimeRef.current
                    ? Math.floor((Date.now() - callStartTimeRef.current) / 1000) : 0;
                const icon = callType === 'video' ? '📹' : '📞';
                const statusText = status === 'ended'
                    ? (duration > 0 ? `${icon} কল শেষ — ${fmtDuration(duration)}` : `${icon} কল মিস`)
                    : status === 'rejected' ? `${icon} কল রিজেক্ট করা হয়েছে`
                    : status === 'missed' ? `${icon} কল মিস হয়েছে`
                    : `${icon} কল`;
                const now = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection('chats').doc(chatId).collection('messages').add({
                    text: statusText,
                    senderId: currentUser.uid,
                    senderName: currentDonorData?.name || 'ডোনার',
                    createdAt: now,
                    seenBy: [currentUser.uid],
                    isCallLog: true
                });
                await db.collection('chats').doc(chatId).set({
                    participants: [currentUser.uid, recipient.id],
                    lastMessage: statusText,
                    lastMessageTime: now,
                    lastSenderId: currentUser.uid,
                    [`unread_${recipient.id}`]: firebase.firestore.FieldValue.increment(1),
                    [`info_${currentUser.uid}`]: { name: currentDonorData?.name || 'ডোনার', image: currentDonorData?.image || '', bloodGroup: currentDonorData?.bloodGroup || '' },
                    [`info_${recipient.id}`]: { name: recipient.name, image: recipient.image || '', bloodGroup: recipient.bloodGroup || '' }
                }, { merge: true });
            } catch(e) {}
        };

        useEffect(() => {
            const stopRingFn = startRing();
            startCall();
            return () => {
                stopRingFn();
                cleanup();
            };
        }, []);

        const cleanup = () => {
            stopRing();
            clearInterval(timerRef.current);
            unsubsRef.current.forEach(u => { try { u(); } catch(e) {} });
            if (localStreamRef.current) localStreamRef.current.getTracks().forEach(t => t.stop());
            if (pcRef.current) { try { pcRef.current.close(); } catch(e) {} }
        };

        /* ── ক্যামেরা ফ্লিপ — ঠিক করা ── */
        const flipCamera = async () => {
            const newFacing = facingMode === 'user' ? 'environment' : 'user';
            try {
                /* নতুন ক্যামেরা স্ট্রিম নাও */
                const newStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: newFacing } },
                    audio: false
                });
                const newVideoTrack = newStream.getVideoTracks()[0];
                if (!newVideoTrack) return;

                /* WebRTC sender এ নতুন track দাও */
                if (pcRef.current) {
                    const sender = pcRef.current.getSenders().find(s => s.track?.kind === 'video');
                    if (sender) await sender.replaceTrack(newVideoTrack);
                }

                /* পুরনো ভিডিও track বন্ধ করো */
                if (localStreamRef.current) {
                    localStreamRef.current.getVideoTracks().forEach(t => t.stop());
                    /* নতুন track যোগ করো */
                    const oldVideoTrack = localStreamRef.current.getVideoTracks()[0];
                    if (oldVideoTrack) localStreamRef.current.removeTrack(oldVideoTrack);
                    localStreamRef.current.addTrack(newVideoTrack);
                }

                /* preview আপডেট */
                if (localVideoRef.current) {
                    localVideoRef.current.srcObject = null;
                    localVideoRef.current.srcObject = localStreamRef.current;
                }
                setFacingMode(newFacing);
            } catch(e) {
                /* exact facingMode কাজ না করলে ideal দিয়ে চেষ্টা */
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: newFacing },
                        audio: false
                    });
                    const newVideoTrack = newStream.getVideoTracks()[0];
                    if (!newVideoTrack) return;
                    if (pcRef.current) {
                        const sender = pcRef.current.getSenders().find(s => s.track?.kind === 'video');
                        if (sender) await sender.replaceTrack(newVideoTrack);
                    }
                    if (localStreamRef.current) {
                        localStreamRef.current.getVideoTracks().forEach(t => t.stop());
                        const old = localStreamRef.current.getVideoTracks()[0];
                        if (old) localStreamRef.current.removeTrack(old);
                        localStreamRef.current.addTrack(newVideoTrack);
                    }
                    if (localVideoRef.current) {
                        localVideoRef.current.srcObject = null;
                        localVideoRef.current.srcObject = localStreamRef.current;
                    }
                    setFacingMode(newFacing);
                } catch(e2) {}
            }
        };

        const startCall = async () => {
            try {
                const iceServers = await getIceServers();
                const pc = new RTCPeerConnection({ iceServers });
                pcRef.current = pc;

                const constraints = callType === 'video'
                    ? { video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: true }
                    : { audio: true, video: false };

                let stream;
                try { stream = await navigator.mediaDevices.getUserMedia(constraints); }
                catch(e) { stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); }
                localStreamRef.current = stream;
                if (localVideoRef.current) localVideoRef.current.srcObject = stream;
                stream.getTracks().forEach(t => pc.addTrack(t, stream));

                const remoteStream = new MediaStream();
                pc.ontrack = e => {
                    e.streams[0].getTracks().forEach(t => remoteStream.addTrack(t));
                    if (remoteVideoRef.current) remoteVideoRef.current.srcObject = remoteStream;
                };

                if (!existingCallId) {
                    const callDoc = db.collection('calls').doc();
                    callDocRef.current = callDoc;

                    pc.onicecandidate = e => {
                        if (e.candidate) callDoc.collection('offerCandidates').add(e.candidate.toJSON());
                    };

                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    await callDoc.set({
                        offer: { type: offer.type, sdp: offer.sdp },
                        callerId: currentUser.uid,
                        callerName: currentDonorData?.name || 'ডোনার',
                        callerImage: currentDonorData?.image || '',
                        receiverId: recipient.id,
                        callType,
                        status: 'calling',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    await db.collection('userInbox').doc(recipient.id).collection('notifications').add({
                        type: 'call', callId: callDoc.id, callType,
                        fromUid: currentUser.uid,
                        fromName: currentDonorData?.name || 'ডোনার',
                        fromImage: currentDonorData?.image || '',
                        preview: callType === 'video' ? '📹 ভিডিও কল' : '📞 অডিও কল',
                        read: false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    const unsub1 = callDoc.onSnapshot(async snap => {
                        const data = snap.data();
                        if (!data) return;
                        if (data.answer && pc.signalingState !== 'stable') {
                            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                        }
                        if (data.status === 'connected') setCallStatus('connected');
                        if (data.status === 'ended') {
                            await saveCallLog('ended');
                            setCallStatus('ended');
                            setTimeout(onEnd, 1500);
                        }
                        if (data.status === 'rejected') {
                            await saveCallLog('rejected');
                            setCallStatus('rejected');
                            setTimeout(onEnd, 1500);
                        }
                    });
                    unsubsRef.current.push(unsub1);

                    const unsub2 = callDoc.collection('answerCandidates').onSnapshot(snap => {
                        snap.docChanges().forEach(async ch => {
                            if (ch.type === 'added') {
                                try { await pc.addIceCandidate(new RTCIceCandidate(ch.doc.data())); } catch(e) {}
                            }
                        });
                    });
                    unsubsRef.current.push(unsub2);

                    /* ৪৫ সেকেন্ড পর মিস */
                    setTimeout(async () => {
                        const snap = await callDoc.get();
                        if (snap.data()?.status === 'calling') {
                            await callDoc.update({ status: 'missed' });
                            await saveCallLog('missed');
                            setCallStatus('missed');
                            setTimeout(onEnd, 1500);
                        }
                    }, 45000);

                } else {
                    const callDoc = db.collection('calls').doc(existingCallId);
                    callDocRef.current = callDoc;

                    pc.onicecandidate = e => {
                        if (e.candidate) callDoc.collection('answerCandidates').add(e.candidate.toJSON());
                    };

                    const callSnap = await callDoc.get();
                    const callData = callSnap.data();
                    await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    await callDoc.update({ answer: { type: answer.type, sdp: answer.sdp }, status: 'connected' });
                    setCallStatus('connected');

                    const unsub3 = callDoc.collection('offerCandidates').onSnapshot(snap => {
                        snap.docChanges().forEach(async ch => {
                            if (ch.type === 'added') {
                                try { await pc.addIceCandidate(new RTCIceCandidate(ch.doc.data())); } catch(e) {}
                            }
                        });
                    });
                    unsubsRef.current.push(unsub3);

                    const unsub4 = callDoc.onSnapshot(async snap => {
                        const data = snap.data();
                        if (data?.status === 'ended') {
                            await saveCallLog('ended');
                            setCallStatus('ended');
                            setTimeout(onEnd, 1500);
                        }
                    });
                    unsubsRef.current.push(unsub4);
                }

                pc.onconnectionstatechange = () => {
                    if (pc.connectionState === 'connected') setCallStatus('connected');
                    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                        setCallStatus('ended');
                        setTimeout(onEnd, 1500);
                    }
                };

            } catch(e) {
                setCallStatus('ended');
                setTimeout(onEnd, 2000);
            }
        };

        const endCall = async () => {
            try {
                if (callDocRef.current) await callDocRef.current.update({ status: 'ended' });
            } catch(e) {}
            await saveCallLog('ended');
            cleanup();
            onEnd();
        };

        const toggleMute = () => {
            if (localStreamRef.current) {
                localStreamRef.current.getAudioTracks().forEach(t => { t.enabled = isMuted; });
                setIsMuted(!isMuted);
            }
        };

        const toggleCam = () => {
            if (localStreamRef.current) {
                localStreamRef.current.getVideoTracks().forEach(t => { t.enabled = isCamOff; });
                setIsCamOff(!isCamOff);
            }
        };

        const statusText = {
            calling: 'কল করা হচ্ছে... 📳',
            connecting: 'কানেক্ট হচ্ছে...',
            connected: fmtDuration(callDuration),
            ended: 'কল শেষ হয়েছে',
            rejected: 'কল রিজেক্ট হয়েছে',
            missed: 'কল মিস হয়েছে'
        };

        return (
            <div className="fixed inset-0 z-[150] flex flex-col" style={{background:'linear-gradient(160deg,#0a0a1a,#1a0a2e,#0a1a0a)'}}>

                {/* ভিডিও এলাকা */}
                {callType === 'video' ? (
                    <div className="flex-1 relative">
                        <video ref={remoteVideoRef} autoPlay playsInline className="w-full h-full object-cover" style={{background:'#111'}}/>
                        {/* লোকাল ভিডিও */}
                        <div className="absolute top-14 right-4 w-28 h-40 rounded-2xl overflow-hidden border-2 border-white/30 shadow-2xl">
                            <video ref={localVideoRef} autoPlay playsInline muted
                                className="w-full h-full object-cover"
                                style={{transform: facingMode==='user' ? 'scaleX(-1)' : 'none'}}/>
                            {/* ক্যামেরা ফ্লিপ বাটন */}
                            <button onClick={flipCamera}
                                className="absolute bottom-1 right-1 w-7 h-7 bg-black/50 rounded-full flex items-center justify-center text-sm">
                                🔄
                            </button>
                        </div>
                        {callStatus !== 'connected' && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/70">
                                <div className={`w-24 h-24 rounded-full overflow-hidden border-4 border-white/30 mb-4 ${callStatus==='calling'?'call-pulse':''}`}>
                                    {recipient.image
                                        ? <img src={recipient.image} className="w-full h-full object-cover"/>
                                        : <div className="w-full h-full bg-red-600 flex items-center justify-center text-white text-2xl font-black">{recipient.bloodGroup}</div>}
                                </div>
                                <p className="text-white font-black text-xl">{recipient.name}</p>
                                <p className="text-white/60 text-sm mt-2">{statusText[callStatus]}</p>
                            </div>
                        )}
                    </div>
                ) : (
                    <div className="flex-1 flex flex-col items-center justify-center gap-4">
                        <audio ref={remoteVideoRef} autoPlay playsInline/>
                        <audio ref={localVideoRef} autoPlay playsInline muted/>
                        <div className={`w-36 h-36 rounded-full overflow-hidden border-4 shadow-2xl ${callStatus==='connected'?'border-green-400 call-pulse':'border-white/30'}`}>
                            {recipient.image
                                ? <img src={recipient.image} className="w-full h-full object-cover"/>
                                : <div className="w-full h-full bg-red-600 flex items-center justify-center text-white text-4xl font-black">{recipient.bloodGroup}</div>}
                        </div>
                        <p className="text-white font-black text-2xl mt-2">{recipient.name}</p>
                        <p className="text-white/50 text-xs">{recipient.bloodGroup} · {recipient.address}</p>
                        <div className={`mt-2 px-6 py-2 rounded-full text-sm font-bold ${
                            callStatus==='connected' ? 'bg-green-500/20 text-green-400'
                            : callStatus==='ended'||callStatus==='rejected'||callStatus==='missed' ? 'bg-red-500/20 text-red-400'
                            : 'bg-white/10 text-white/60'}`}>
                            {statusText[callStatus]}
                        </div>
                    </div>
                )}

                {/* কন্ট্রোল বাটন */}
                <div className="px-6 pb-14 pt-5 flex justify-center gap-5" style={{background:'rgba(0,0,0,0.6)'}}>
                    {/* মিউট */}
                    <button onClick={toggleMute}
                        className={`w-14 h-14 rounded-full flex flex-col items-center justify-center gap-0.5 transition active:scale-90 ${isMuted?'bg-red-500':'bg-white/15'}`}>
                        <span className="text-xl">{isMuted ? '🔇' : '🎙️'}</span>
                        <span className="text-white text-[9px]">{isMuted?'আনমিউট':'মিউট'}</span>
                    </button>
                    {/* ভিডিও ক্যামেরা বন্ধ/চালু */}
                    {callType==='video' && (
                        <button onClick={toggleCam}
                            className={`w-14 h-14 rounded-full flex flex-col items-center justify-center gap-0.5 transition active:scale-90 ${isCamOff?'bg-red-500':'bg-white/15'}`}>
                            <span className="text-xl">{isCamOff ? '🚫' : '📷'}</span>
                            <span className="text-white text-[9px]">{isCamOff?'ক্যামচালু':'ক্যামবন্ধ'}</span>
                        </button>
                    )}
                    {/* কল শেষ */}
                    <button onClick={endCall}
                        className="w-16 h-16 bg-red-500 hover:bg-red-600 rounded-full flex flex-col items-center justify-center gap-0.5 transition shadow-xl active:scale-90">
                        <span className="text-2xl">📵</span>
                        <span className="text-white text-[9px]">কাটুন</span>
                    </button>
                    {/* ক্যামেরা ফ্লিপ (ভিডিওতে) */}
                    {callType==='video' && (
                        <button onClick={flipCamera}
                            className="w-14 h-14 bg-white/15 rounded-full flex flex-col items-center justify-center gap-0.5 transition active:scale-90">
                            <span className="text-xl">🔄</span>
                            <span className="text-white text-[9px]">ফ্লিপ</span>
                        </button>
                    )}
                    {/* স্পিকার */}
                    <button onClick={()=>setIsSpeaker(!isSpeaker)}
                        className={`w-14 h-14 rounded-full flex flex-col items-center justify-center gap-0.5 transition active:scale-90 ${!isSpeaker?'bg-red-500':'bg-white/15'}`}>
                        <span className="text-xl">{isSpeaker ? '🔊' : '🔈'}</span>
                        <span className="text-white text-[9px]">{isSpeaker?'স্পিকার':'ইয়ার'}</span>
                    </button>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════════════════
       CHAT SYSTEM — সম্পূর্ণ ঠিক করা
       চ্যাট ID: দুই user এর uid sort করে join
       Firestore: chats/{chatId}/messages
    ══════════════════════════════════════════ */
    function getChatId(uid1, uid2) { return [uid1, uid2].sort().join('__'); }

    function ChatWindow({ currentUser, currentDonorData, recipient, onClose }) {
        const [messages, setMessages] = useState([]);
        const [text, setText] = useState('');
        const [activeCall, setActiveCall] = useState(null);
        const [isRecipientOnline, setIsRecipientOnline] = useState(false);
        const endRef = useRef(null);
        const inputRef = useRef(null);
        const chatId = getChatId(currentUser.uid, recipient.id);

        /* recipient এর অনলাইন স্ট্যাটাস */
        useEffect(() => {
            const unsub = db.collection('presence').doc(recipient.id)
                .onSnapshot(snap => {
                    if (!snap.exists) { setIsRecipientOnline(false); return; }
                    const d = snap.data();
                    if (d.lastSeen && d.lastSeen.toDate) {
                        const diff = (Date.now() - d.lastSeen.toDate().getTime()) / 1000;
                        setIsRecipientOnline(diff < 30);
                    }
                }, ()=>{});
            return unsub;
        }, [recipient.id]);

        /* চ্যাট খুললে unread মেসেজ seen করে দাও */
        useEffect(() => {
            const markSeen = async () => {
                try {
                    await db.collection('chats').doc(chatId).set({
                        [`seenBy_${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                } catch(e){}
            };
            markSeen();
        }, [chatId, currentUser.uid]);

        useEffect(() => {
            const unsub = db.collection('chats').doc(chatId)
                .collection('messages').orderBy('createdAt','asc')
                .onSnapshot(snap => {
                    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(msgs);
                    /* নতুন মেসেজ এলে seen আপডেট */
                    db.collection('chats').doc(chatId).set({
                        [`seenBy_${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true }).catch(()=>{});
                }, err => console.log('chat err', err));
            return unsub;
        }, [chatId]);

        useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

        const sendMessage = async () => {
            const msg = text.trim(); if (!msg) return;
            setText('');
            inputRef.current?.focus();
            const now = firebase.firestore.FieldValue.serverTimestamp();
            /* মেসেজ সেভ */
            await db.collection('chats').doc(chatId).collection('messages').add({
                text: msg,
                senderId: currentUser.uid,
                senderName: currentDonorData?.name || 'ডোনার',
                createdAt: now,
                seenBy: [currentUser.uid]
            });
            /* চ্যাট মেটা আপডেট — unreadCount recipient এর জন্য বাড়াও */
            await db.collection('chats').doc(chatId).set({
                participants: [currentUser.uid, recipient.id],
                lastMessage: msg,
                lastMessageTime: now,
                lastSenderId: currentUser.uid,
                [`unread_${recipient.id}`]: firebase.firestore.FieldValue.increment(1),
                [`seenBy_${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp(),
                [`info_${currentUser.uid}`]: {
                    name: currentDonorData?.name || 'ডোনার',
                    image: currentDonorData?.image || '',
                    bloodGroup: currentDonorData?.bloodGroup || ''
                },
                [`info_${recipient.id}`]: {
                    name: recipient.name,
                    image: recipient.image || '',
                    bloodGroup: recipient.bloodGroup || ''
                }
            }, { merge: true });
            /* recipient এর inbox-এ আলাদা notification */
            await db.collection('userInbox').doc(recipient.id).collection('notifications').add({
                type: 'message',
                fromUid: currentUser.uid,
                fromName: currentDonorData?.name || 'ডোনার',
                fromImage: currentDonorData?.image || '',
                chatId: chatId,
                preview: msg,
                read: false,
                createdAt: now
            });
            /* নিজের ব্রাউজারে নোটিফিকেশন দেখাও (টেস্টের জন্য) */
            showBrowserNotif(
                'মেসেজ পাঠানো হয়েছে',
                (currentDonorData?.name || 'তুমি') + ' → ' + recipient.name + ': ' + msg,
                'message'
            );
        };

        const fmt = ts => { if (!ts) return ''; try { const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'}); } catch(e){return '';} };

        return (
            <div className="fixed inset-0 z-[60] flex flex-col" style={{background:'linear-gradient(160deg,#0f0c29,#302b63,#24243e)'}}>
                {/* Header */}
                <div className="px-4 pt-10 pb-3 flex items-center gap-3 border-b border-white/10" style={{background:'rgba(0,0,0,0.3)'}}>
                    <button onClick={onClose} className="text-white/60 hover:text-white text-2xl w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 transition">←</button>
                    <div className="w-11 h-11 rounded-full overflow-hidden border-2 border-white/20 flex-shrink-0">
                        {recipient.image ? <img src={recipient.image} className="w-full h-full object-cover"/> : <div className="w-full h-full bg-red-600 flex items-center justify-center text-white text-xs font-black">{recipient.bloodGroup}</div>}
                    </div>
                    <div className="flex-1 min-w-0">
                        <p className="text-white font-black text-base truncate">{recipient.name}</p>
                        <p className="text-[10px]">
                            {isRecipientOnline
                                ? <span className="text-green-400 font-bold">● অনলাইন</span>
                                : <span className="text-white/40">{recipient.bloodGroup} · {recipient.address}</span>}
                        </p>
                    </div>
                    <button onClick={() => setActiveCall({ callType:'video', existingCallId:null })} className="w-10 h-10 bg-blue-500/20 hover:bg-blue-500/30 rounded-full flex items-center justify-center text-lg transition">📹</button>
                    <button onClick={() => setActiveCall({ callType:'audio', existingCallId:null })} className="w-10 h-10 bg-green-500/20 hover:bg-green-500/30 rounded-full flex items-center justify-center text-lg transition">📞</button>
                </div>

                {/* Messages */}
                <div className="flex-1 overflow-y-auto p-4 space-y-2 chat-scroll">
                    {messages.length === 0 && (
                        <div className="text-center text-white/20 mt-24">
                            <p className="text-5xl mb-4">💬</p>
                            <p className="text-sm font-bold">{recipient.name}-এর সাথে কথোপকথন শুরু করুন</p>
                        </div>
                    )}
                    {messages.map((m,i) => {
                        const isMine = m.senderId === currentUser.uid;
                        const prevMsg = messages[i-1];
                        const showDate = !prevMsg || (m.createdAt && prevMsg.createdAt && m.createdAt.toDate && prevMsg.createdAt.toDate &&
                            m.createdAt.toDate().toDateString() !== prevMsg.createdAt.toDate().toDateString());
                        return (
                            <div key={m.id}>
                                {showDate && m.createdAt && m.createdAt.toDate && (
                                    <div className="text-center my-3">
                                        <span className="bg-white/10 text-white/40 text-[10px] px-3 py-1 rounded-full">
                                            {m.createdAt.toDate().toLocaleDateString('bn-BD')}
                                        </span>
                                    </div>
                                )}
                                <div className={`flex items-end gap-2 ${isMine?'justify-end':'justify-start'}`}>
                                    {!isMine && (
                                        <div className="w-7 h-7 rounded-full overflow-hidden flex-shrink-0 mb-1">
                                            {recipient.image ? <img src={recipient.image} className="w-full h-full object-cover"/> : <div className="w-full h-full bg-red-600 flex items-center justify-center text-white text-[8px] font-black">{recipient.bloodGroup}</div>}
                                        </div>
                                    )}
                                    <div className="max-w-[72%]">
                                        {m.isCallLog ? (
                                            <div className="px-4 py-2 bg-white/10 rounded-2xl text-center">
                                                <p className="text-white/70 text-xs font-bold">{m.text}</p>
                                            </div>
                                        ) : (
                                            <div className={`px-4 py-2.5 text-sm leading-relaxed ${isMine?'chat-bubble-sent':'chat-bubble-recv'}`}>{m.text}</div>
                                        )}
                                        <p className={`text-[9px] mt-0.5 ${isMine?'text-right pr-1':'text-left pl-1'} flex items-center gap-0.5 ${isMine?'justify-end':''}`}>
                                            <span className="text-white/25">{fmt(m.createdAt)}</span>
                                            {isMine && !m.isCallLog && (
                                                <span style={{fontSize:'11px'}} title="সিন"
                                                    className={`font-black ${(m.seenBy && m.seenBy.includes(recipient.id)) ? 'text-green-400' : 'text-white/30'}`}>
                                                    {(m.seenBy && m.seenBy.includes(recipient.id)) ? '✓✓' : '✓'}
                                                </span>
                                            )}
                                        </p>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                    <div ref={endRef}/>
                </div>

                {/* Input */}
                <div className="px-4 pb-8 pt-2 flex items-center gap-2 border-t border-white/10" style={{background:'rgba(0,0,0,0.3)'}}>
                    <input ref={inputRef} type="text" value={text} onChange={e=>setText(e.target.value)}
                        onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMessage()}
                        placeholder="মেসেজ লিখুন..."
                        className="flex-1 py-3 px-4 rounded-2xl text-sm outline-none text-white placeholder-white/30"
                        style={{background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.1)'}}/>
                    <button onClick={sendMessage} disabled={!text.trim()}
                        className="w-12 h-12 rounded-2xl flex items-center justify-center text-xl flex-shrink-0 transition"
                        style={{background:text.trim()?'linear-gradient(135deg,#dc2626,#ef4444)':'rgba(255,255,255,0.08)'}}>
                        ➤
                    </button>
                </div>

                {/* কল স্ক্রিন */}
                {activeCall && (
                    <CallScreen
                        currentUser={currentUser}
                        currentDonorData={currentDonorData}
                        recipient={recipient}
                        callType={activeCall.callType}
                        existingCallId={activeCall.existingCallId}
                        onEnd={() => setActiveCall(null)}
                    />
                )}
            </div>
        );
    }

    /* Chat List */
    function ChatList({ currentUser, donors, onOpenChat, onClose, onViewDonor }) {
        const [chats, setChats] = useState([]);
        const [loadingChats, setLoadingChats] = useState(true);
        const [search, setSearch] = useState('');
        const [tab, setTab] = useState('all');
        const [onlineUsers, setOnlineUsers] = useState({});

        /* চ্যাট লিস্ট */
        useEffect(() => {
            const unsub = db.collection('chats')
                .where('participants','array-contains', currentUser.uid)
                .onSnapshot(snap => {
                    setChats(snap.docs.map(d=>({id:d.id,...d.data()})));
                    setLoadingChats(false);
                }, ()=>setLoadingChats(false));
            return unsub;
        }, [currentUser.uid]);

        /* অনলাইন স্ট্যাটাস — presence collection */
        useEffect(() => {
            const unsub = db.collection('presence').onSnapshot(snap => {
                const online = {};
                const now = Date.now();
                snap.docs.forEach(doc => {
                    const d = doc.data();
                    /* ৩০ সেকেন্ডের মধ্যে lastSeen থাকলে অনলাইন */
                    if (d.lastSeen && d.lastSeen.toDate) {
                        const diff = (now - d.lastSeen.toDate().getTime()) / 1000;
                        online[doc.id] = diff < 30;
                    }
                });
                setOnlineUsers(online);
            }, ()=>{});
            return unsub;
        }, []);

        /* নিজের presence আপডেট */
        useEffect(() => {
            const updatePresence = () => {
                db.collection('presence').doc(currentUser.uid).set({
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    online: true
                }, { merge: true }).catch(()=>{});
            };
            updatePresence();
            const interval = setInterval(updatePresence, 20000);
            /* অ্যাপ বন্ধ হলে offline করো */
            const handleBlur = () => {
                db.collection('presence').doc(currentUser.uid).set({ online: false }, { merge: true }).catch(()=>{});
            };
            const handleFocus = () => updatePresence();
            window.addEventListener('blur', handleBlur);
            window.addEventListener('focus', handleFocus);
            return () => {
                clearInterval(interval);
                window.removeEventListener('blur', handleBlur);
                window.removeEventListener('focus', handleFocus);
                db.collection('presence').doc(currentUser.uid).set({ online: false }, { merge: true }).catch(()=>{});
            };
        }, [currentUser.uid]);

        const getChatData = useCallback((donorId) => {
            const cid = getChatId(currentUser.uid, donorId);
            const chat = chats.find(c=>c.id===cid);
            if (!chat) return null;
            return {
                text: chat.lastMessage,
                time: chat.lastMessageTime,
                unread: chat[`unread_${currentUser.uid}`] || 0,
                lastSenderId: chat.lastSenderId,
                seenByRecipient: chat[`seenBy_${donorId}`]
            };
        }, [chats, currentUser.uid]);

        const allDonors = donors.filter(d=>d.id!==currentUser.uid);

        /* লাস্ট মেসেজের সময় অনুযায়ী sort করো — সাম্প্রতিক উপরে */
        const sortedDonors = [...allDonors].sort((a, b) => {
            const cdA = getChatData(a.id);
            const cdB = getChatData(b.id);
            const tA = cdA?.time?.toDate ? cdA.time.toDate().getTime() : 0;
            const tB = cdB?.time?.toDate ? cdB.time.toDate().getTime() : 0;
            return tB - tA;
        });

        const recentDonors = sortedDonors.filter(d => getChatData(d.id));
        const listToShow = tab==='recent' ? recentDonors : sortedDonors;
        const filtered = listToShow.filter(d =>
            (d.name||'').toLowerCase().includes(search.toLowerCase()) ||
            (d.bloodGroup||'').toLowerCase().includes(search.toLowerCase())
        );

        const fmtTime = ts => {
            if (!ts) return '';
            try {
                const d = ts.toDate ? ts.toDate() : new Date(ts);
                const now = new Date();
                if (d.toDateString()===now.toDateString()) return d.toLocaleTimeString('bn-BD',{hour:'2-digit',minute:'2-digit'});
                return d.toLocaleDateString('bn-BD',{day:'2-digit',month:'short'});
            } catch(e){ return ''; }
        };

        const totalUnread = allDonors.reduce((sum, d) => {
            const cd = getChatData(d.id);
            return sum + (cd ? cd.unread : 0);
        }, 0);

        return (

    function PushPermissionBanner({ userId, donorData }) {
        const [show, setShow] = useState(false);
        const [loading, setLoading] = useState(false);

        useEffect(() => {
            if (!userId) return;
            if (!('Notification' in window)) return;
            if (Notification.permission === 'default') {
                const t = setTimeout(() => setShow(true), 2500);
                return () => clearTimeout(t);
            }
        }, [userId]);

        const enable = async () => {
            setLoading(true);
            const granted = await askNotifPermission();
            if (granted) {
                checkDonationReminder(donorData?.lastDonationDate);
                showBrowserNotif('নোটিফিকেশন চালু হয়েছে! ✅', 'এখন থেকে ইমার্জেন্সি ও নোটিস পাবেন', 'notice');
            }
            setLoading(false);
            setShow(false);
        };

        if (!show) return null;

        return (
            <div className="fixed top-4 left-3 right-3 z-[200] notif-slide">
                <div className="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl shadow-2xl p-4 flex items-start gap-3">
                    <div className="text-2xl flex-shrink-0">🔔</div>
                    <div className="flex-1 min-w-0">
                        <p className="text-white font-black text-sm">নোটিফিকেশন চালু করুন</p>
                        <p className="text-white/75 text-[11px] mt-0.5 leading-relaxed">ইমার্জেন্সি রক্তের অনুরোধ, নোটিস ও মেসেজের তাৎক্ষণিক নোটিফিকেশন পাবেন</p>
                        <div className="flex gap-2 mt-2.5">
                            <button onClick={enable} disabled={loading}
                                className="bg-white text-indigo-600 font-black text-xs px-4 py-1.5 rounded-xl active:scale-95 transition">
                                {loading ? '⏳...' : '✅ চালু করুন'}
                            </button>
                            <button onClick={() => setShow(false)}
                                className="text-white/60 text-xs px-3 py-1.5 hover:text-white transition">
                                এখন না
                            </button>
                        </div>
                    </div>
                    <button onClick={() => setShow(false)} className="text-white/50 hover:text-white text-xl leading-none flex-shrink-0">×</button>
                </div>
            </div>
        );
    }

    /* ══════════════════════════════
       PUSH NOTIFICATION SYSTEM
    ══════════════════════════════ */
    function useInboxNotifications(userId) {
        const [inbox, setInbox] = useState([]);
        const [unread, setUnread] = useState(0);

        useEffect(() => {
            if (!userId) return;
            const unsub = db.collection('userInbox').doc(userId).collection('notifications')
                .orderBy('createdAt','desc').limit(30)
                .onSnapshot(snap => {
                    const items = snap.docs.map(d=>({id:d.id,...d.data()}));
                    setInbox(items);
                    setUnread(items.filter(i=>!i.read).length);
                }, ()=>{});
            return unsub;
        }, [userId]);

        const markAllRead = useCallback(async () => {
            if (!userId) return;
            const unreadItems = inbox.filter(i=>!i.read);
            const batch = db.batch();
            unreadItems.forEach(item => {
                batch.update(db.collection('userInbox').doc(userId).collection('notifications').doc(item.id), { read:true });
            });
            if (unreadItems.length) await batch.commit();
        }, [inbox, userId]);

        return { inbox, unread, markAllRead };
    }

    function EmergencyPanel({ currentUser, currentDonorData, donors, onClose, showToast, onViewDonor }) {
        const [bloodGroup, setBloodGroup] = useState('A+');
        const [location, setLocation] = useState('');
        const [hospital, setHospital] = useState('');
        const [note, setNote] = useState('');
        const [sending, setSending] = useState(false);
        const [requests, setRequests] = useState([]);
        const [tab, setTab] = useState('list');

        useEffect(() => {
            const unsub = db.collection('emergencyRequests')
                .orderBy('createdAt','desc').limit(20)
                .onSnapshot(snap => setRequests(snap.docs.map(d=>({id:d.id,...d.data()}))),
                err => console.log('emergency err', err));
            return unsub;
        }, []);

        const sendRequest = async () => {
            if (!location.trim()) return showToast('অবস্থান দিন','error');
            if (!hospital.trim()) return showToast('হাসপাতালের নাম দিন','error');
            setSending(true);
            try {
                const now = firebase.firestore.FieldValue.serverTimestamp();
                const reqRef = await db.collection('emergencyRequests').add({
                    bloodGroup,
                    location: location.trim(),
                    hospital: hospital.trim(),
                    note: note.trim(),
                    requesterUid: currentUser.uid,
                    requesterName: currentDonorData?.name || 'অজানা',
                    requesterPhone: currentDonorData?.phone || '',
                    requesterImage: currentDonorData?.image || '',
                    status: 'active',
                    createdAt: now
                });
                /* মিলে যাওয়া ডোনারদের ইনবক্সে নোটিফিকেশন */
                const matched = donors.filter(d => d.bloodGroup===bloodGroup && d.id!==currentUser.uid && getDonationStatus(d.lastDonationDate).canDonate);
                if (matched.length > 0) {
                    const batch = db.batch();
                    matched.forEach(d => {
                        const nRef = db.collection('userInbox').doc(d.id).collection('notifications').doc();
                        batch.set(nRef, {
                            type: 'emergency',
                            fromName: currentDonorData?.name || 'কেউ',
                            fromUid: currentUser.uid,
                            fromImage: currentDonorData?.image || '',
                            preview: `🆘 ${bloodGroup} রক্ত দরকার — ${hospital}`,
                            requestId: reqRef.id,
                            read: false,
                            createdAt: now
                        });
                    });
                    await batch.commit();
                }
                /* সব ইউজারকে ইনবক্সে জানাও */
                await broadcastToAllInbox(
                    currentUser.uid,
                    'emergency',
                    '🆘 ' + bloodGroup + ' রক্ত দরকার!',
                    hospital + ' — ' + location.trim(),
                    { fromName: (currentDonorData && currentDonorData.name) || 'কেউ', fromImage: (currentDonorData && currentDonorData.image) || '' }
                );
                /* ব্রাউজার পুশ নোটিফিকেশন */
                showBrowserNotif(
                    bloodGroup + ' রক্ত দরকার!',
                    hospital + ' — ' + location.trim(),
                    'emergency'
                );
                setLocation(''); setHospital(''); setNote('');
                setSending(false);
                setTab('list');
                showToast(`${matched.length} জন ডোনারকে জানানো হয়েছে ✅`,'success');
            } catch(e) {
                setSending(false);
                showToast('পাঠাতে সমস্যা হয়েছে: '+e.message, 'error');
            }
        };

        const closeRequest = async (id) => {
            await db.collection('emergencyRequests').doc(id).update({ status:'closed' });
            showToast('অনুরোধ বন্ধ করা হয়েছে','success');
        };

        const deleteRequest = async (id) => {
            if (!confirm('এই অনুরোধ মুছে দিবেন?')) return;
            try {
                await db.collection('emergencyRequests').doc(id).delete();
                showToast('অনুরোধ মুছে ফেলা হয়েছে','success');
            } catch(e) { showToast('মুছতে পারা যায়নি','error'); }
        };

        /* ৪৮ ঘণ্টা পুরানো active রিকুয়েস্ট অটো-close */
        useEffect(() => {
            const now = Date.now();
            requests.forEach(r => {
                if (r.status === 'active' && r.createdAt) {
                    try {
                        const created = r.createdAt.toDate ? r.createdAt.toDate() : new Date(r.createdAt);
                        const hoursOld = (now - created.getTime()) / 3600000;
                        if (hoursOld >= 48) {
                            db.collection('emergencyRequests').doc(r.id).update({ status: 'expired' }).catch(()=>{});
                        }
                    } catch(e) {}
                }
            });
        }, [requests]);

        const fmtTime = ts => { try { const d=ts?.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('bn-BD',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); } catch(e){return '';} };

        return (
            <div className="fixed inset-0 bg-black/60 z-[55] flex items-end sm:items-center justify-center p-0 sm:p-4 fade-in">
                <div className="bg-white w-full sm:max-w-lg rounded-t-3xl sm:rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[92vh]">
                    <div className="bg-gradient-to-r from-red-700 to-red-500 px-5 py-4 flex items-center justify-between text-white">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-xl emergency-pulse">🆘</div>
                            <div><h2 className="font-black">ইমার্জেন্সি রক্ত</h2><p className="text-[10px] text-white/60">জরুরি রক্তের অনুরোধ</p></div>
                        </div>
                        <button onClick={onClose} className="bg-white/20 w-9 h-9 rounded-full flex items-center justify-center font-black text-xl">×</button>
                    </div>

                    <div className="flex bg-gray-50 p-1 mx-4 mt-4 rounded-2xl gap-1">
                        <button onClick={()=>setTab('list')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${tab==='list'?'bg-white text-red-600 shadow':'text-gray-400'}`}>🔴 চলমান অনুরোধ ({requests.filter(r=>r.status==='active').length})</button>
                        <button onClick={()=>setTab('new')} className={`flex-1 py-2 rounded-xl text-xs font-bold transition ${tab==='new'?'bg-white text-red-600 shadow':'text-gray-400'}`}>➕ নতুন অনুরোধ</button>
                    </div>

                    <div className="overflow-y-auto flex-1 p-4 space-y-3">
                        {tab==='list' && (
                            <>
                                {requests.filter(r=>r.status==='active').length===0 && (
                                    <div className="text-center py-12 text-gray-300">
                                        <p className="text-5xl mb-3">✅</p>
                                        <p className="text-sm font-bold">এই মুহূর্তে কোনো ইমার্জেন্সি নেই</p>
                                    </div>
                                )}
                                {requests.filter(r=>r.status==='active').map(r => {
                                    /* রিকুয়েস্টকারীর ডোনার ডেটা খুঁজি */

                                            <div className="flex items-start gap-3">

                                                    <p className="font-bold text-sm text-gray-800">🏥 {r.hospital}</p>
                                                    <p className="text-xs text-gray-500 mt-0.5">📍 {r.location}</p>
                                                    {r.note && <p className="text-xs text-gray-400 mt-1 italic">"{r.note}"</p>}
